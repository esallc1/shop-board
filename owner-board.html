<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lee Transmission — Owner Board</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f5f6fa;
    --surface:   #ffffff;
    --surface-2: #f0f1f5;
    --border:    #e2e5ee;
    --text:      #1a1f36;
    --muted:     #8c93a8;
    --radius:    10px;
    --accent:    #5b5ef4;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: #ffffff;
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-title {
    font-size: 1.05rem; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text);
  }
  .header-sub { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
  .header-controls { display: flex; align-items: center; gap: 14px; }
  .live-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.7rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #22c55e; animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .greeting-wrap { display: none; align-items: center; gap: 8px; font-size: 0.78rem; font-weight: 600; color: var(--text); }
  .greeting-avatar { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; }
  .greeting-avatar-fallback {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--accent); color: #fff; font-weight: 800; font-size: 0.72rem;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── CONTENT (placeholder for now) ── */
  .content { padding: 60px 28px; display: flex; justify-content: center; }
  .stub-view {
    background: #ffffff; border: 1px solid var(--border); border-radius: var(--radius);
    padding: 60px 50px; text-align: center; color: var(--muted);
    box-shadow: 0 2px 8px rgba(0,0,0,0.05); max-width: 480px;
  }
  .stub-view h2 { font-size: 1.1rem; color: var(--text); margin-bottom: 10px; }
  .stub-view p { font-size: 0.85rem; line-height: 1.6; }

  /* ── TEAM CHAT WIDGET ── */
  .chat-bubble {
    position: fixed; bottom: 28px; right: 28px; z-index: 9000;
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; cursor: pointer;
    box-shadow: 0 4px 16px rgba(91,94,244,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    user-select: none;
  }
  .chat-bubble:hover { transform: scale(1.07); box-shadow: 0 6px 20px rgba(91,94,244,0.45); }
  .chat-unread {
    position: absolute; top: -3px; right: -3px;
    width: 17px; height: 17px; border-radius: 50%;
    background: #ef4444; color: #fff;
    font-size: 0.6rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid #fff;
  }
  .chat-panel {
    position: fixed; bottom: 88px; right: 28px; z-index: 8999;
    width: 320px; max-height: 420px;
    background: #fff; border: 1px solid var(--border);
    border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.13);
    display: none; flex-direction: column; overflow: hidden;
  }
  .chat-panel.open { display: flex; }
  .chat-header {
    padding: 12px 16px; background: var(--accent); color: #fff;
    font-size: 0.82rem; font-weight: 700; letter-spacing: 0.5px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: move; user-select: none;
  }
  .chat-close { cursor: pointer; opacity: 0.8; font-size: 1rem; }
  .chat-close:hover { opacity: 1; }
  .chat-channels {
    display: flex; gap: 6px; padding: 8px 12px;
    border-bottom: 1px solid var(--border); background: #fff;
  }
  .chat-channel-btn {
    flex: 1; font-size: 0.66rem; font-weight: 700; padding: 6px 4px;
    border-radius: 6px; border: 1px solid var(--border); background: var(--bg);
    color: var(--muted); cursor: pointer; text-align: center; transition: all 0.15s;
  }
  .chat-channel-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .chat-channel-btn:hover:not(.active) { background: var(--surface-2); }
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 8px;
    background: #f8f9fc;
  }
  .chat-msg { max-width: 82%; display: flex; flex-direction: column; }
  .chat-msg.me { align-self: flex-end; align-items: flex-end; }
  .chat-msg.them { align-self: flex-start; align-items: flex-start; }
  .chat-msg-sender { font-size: 0.65rem; font-weight: 700; color: #8c93a8; margin-bottom: 2px; padding: 0 4px; }
  .chat-msg-bubble { padding: 8px 12px; border-radius: 14px; font-size: 0.83rem; line-height: 1.45; }
  .chat-msg.me .chat-msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .chat-msg.them .chat-msg-bubble { background: #fff; color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .chat-msg-time { font-size: 0.62rem; color: #8c93a8; margin-top: 3px; padding: 0 4px; }
  .chat-input-row {
    display: flex; gap: 8px; padding: 10px 12px;
    border-top: 1px solid var(--border); background: #fff;
  }
  .chat-input-row input {
    flex: 1; font-size: 0.82rem; padding: 7px 10px;
    border-radius: 20px; background: #f0f1f7;
    border: 1px solid var(--border); outline: none;
    font-family: inherit;
  }
  .chat-input-row input:focus { border-color: var(--accent); }
  .emoji-picker-wrap { position: relative; flex-shrink: 0; }
  .emoji-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: #f0f1f7; border: 1px solid var(--border);
    cursor: pointer; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .emoji-btn:hover { background: var(--surface-2); }
  .emoji-popover {
    position: absolute; bottom: 42px; left: 0;
    width: 216px; max-height: 176px; overflow-y: auto;
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    padding: 8px; z-index: 10;
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px;
  }
  .emoji-popover button {
    background: none; border: none; font-size: 1.15rem; cursor: pointer;
    padding: 4px; border-radius: 6px; line-height: 1.3;
  }
  .emoji-popover button:hover { background: var(--surface-2); }
  .chat-send-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--accent); color: #fff;
    border: none; cursor: pointer; font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity 0.15s;
  }
  .chat-send-btn:hover { opacity: 0.85; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Lee Transmission — Owner Board</div>
    <div class="header-sub">Owner View · Prototype</div>
  </div>
  <div class="header-controls">
    <div class="greeting-wrap" id="greetingWrap"></div>
    <div class="live-badge"><div class="live-dot"></div>Live</div>
  </div>
</div>

<div class="content">
  <div class="stub-view">
    <h2>Owner Board</h2>
    <p>Additional views coming soon. For now, use the chat bubble in the bottom-right corner to reach the Manager or Advisor, or post to the group.</p>
  </div>
</div>

<!-- Team Chat Widget -->
<div class="chat-bubble" id="chat-bubble">
  💬
  <div class="chat-unread" id="chat-unread" style="display:none"></div>
</div>
<div class="chat-panel" id="chat-panel">
  <div class="chat-header">
    <span>Team Chat</span>
    <span class="chat-close" id="chat-close">✕</span>
  </div>
  <div class="chat-channels" id="chat-channels"></div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-row">
    <div class="emoji-picker-wrap">
      <button class="emoji-btn" id="emoji-btn" type="button" title="Emoji">😊</button>
      <div class="emoji-popover" id="emoji-popover" style="display:none"></div>
    </div>
    <input type="text" id="chat-input" placeholder="Message…" />
    <button class="chat-send-btn" id="chat-send">➤</button>
  </div>
</div>

<script>
  // ── Supabase
  const SUPABASE_URL = 'https://hygemiszxwmyrkmhbjub.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_8o9Df7K_DGpQ3s6yUCDq-A_HMh4Zllo';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function esc(s) { return (s || '').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  // ── Team Chat (real, Supabase-backed — owner-board = Owner's view)
  // CHAT_IDENTITY is populated by captureSessionAndGreet() below once the
  // session's phone resolves against `employees`; sending is blocked until then.
  let CHAT_IDENTITY = { name: null, role: null };

  const CHAT_CHANNELS = [
    { key: 'group',         label: 'Group' },
    { key: 'owner_manager', label: 'Manager' },
    { key: 'owner_advisor', label: 'Advisor' },
  ];
  let CURRENT_CHANNEL = 'group';
  let chatMessages = [];
  let chatRealtimeChannel = null;

  function formatChatTime(iso) {
    return new Date(iso).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  function renderChannelTabs() {
    const wrap = document.getElementById('chat-channels');
    wrap.innerHTML = CHAT_CHANNELS.map(c =>
      `<button class="chat-channel-btn${c.key === CURRENT_CHANNEL ? ' active' : ''}" data-channel="${c.key}">${c.label}</button>`
    ).join('');
    wrap.querySelectorAll('[data-channel]').forEach(btn => {
      btn.addEventListener('click', () => switchChatChannel(btn.dataset.channel));
    });
  }

  async function loadChatMessages(channel) {
    const { data, error } = await db.from('chat_messages').select('*').eq('channel', channel).order('created_at');
    if (error) { console.error('[Chat] load failed', error); chatMessages = []; }
    else chatMessages = data || [];
    renderChat();
  }

  function subscribeChatChannel(channel) {
    if (chatRealtimeChannel) {
      db.removeChannel(chatRealtimeChannel);
      chatRealtimeChannel = null;
    }
    chatRealtimeChannel = db.channel('chat-live')
      .on('postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'chat_messages', filter: `channel=eq.${channel}` },
        ({ new: rec }) => { if (rec) { chatMessages.push(rec); renderChat(); } }
      )
      .subscribe();
  }

  function switchChatChannel(channel) {
    CURRENT_CHANNEL = channel;
    renderChannelTabs();
    loadChatMessages(channel);
    subscribeChatChannel(channel);
  }

  function renderChat() {
    const box = document.getElementById('chat-messages');
    box.innerHTML = chatMessages.map(m => `
      <div class="chat-msg ${m.sender_name === CHAT_IDENTITY.name ? 'me' : 'them'}">
        <div class="chat-msg-sender">${esc(m.sender_name)}</div>
        <div class="chat-msg-bubble">${esc(m.message)}</div>
        <div class="chat-msg-time">${formatChatTime(m.created_at)}</div>
      </div>`).join('');
    box.scrollTop = box.scrollHeight;
  }

  async function sendChatMsg() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;
    if (!CHAT_IDENTITY.name || !CHAT_IDENTITY.role) {
      alert('Could not identify you on this board yet — try reopening it from CrisData.');
      return;
    }
    input.value = '';
    const { error } = await db.from('chat_messages').insert({
      channel: CURRENT_CHANNEL,
      sender_role: CHAT_IDENTITY.role,
      sender_name: CHAT_IDENTITY.name,
      message: text,
    });
    if (error) {
      console.error('[Chat] send failed', error);
      alert('Message failed to send: ' + error.message);
    }
  }

  document.getElementById('chat-bubble').addEventListener('click', () => {
    const panel = document.getElementById('chat-panel');
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) {
      document.getElementById('chat-unread').style.display = 'none';
    }
  });

  document.getElementById('chat-close').addEventListener('click', e => {
    e.stopPropagation();
    document.getElementById('chat-panel').classList.remove('open');
  });

  document.getElementById('chat-send').addEventListener('click', sendChatMsg);
  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendChatMsg();
  });

  renderChannelTabs();
  loadChatMessages(CURRENT_CHANNEL);
  subscribeChatChannel(CURRENT_CHANNEL);

  // ── Emoji picker (desktop convenience — phone keyboards already have one)
  const EMOJI_LIST = ['👍','👎','✅','❌','🔥','💯','👏','🙌','💪','🙏',
                       '😊','😂','😅','😉','😎','🤔','😬','😢','😡','🥳',
                       '🚗','🔧','⚙️','⚠️','🛠️','🔩','⏰','📞','📸','💰'];

  function renderEmojiPopover() {
    const pop = document.getElementById('emoji-popover');
    pop.innerHTML = EMOJI_LIST.map(e => `<button type="button" data-emoji="${e}">${e}</button>`).join('');
    pop.querySelectorAll('[data-emoji]').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById('chat-input');
        input.value += btn.dataset.emoji;
        pop.style.display = 'none';
        input.focus();
      });
    });
  }

  document.getElementById('emoji-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    const pop = document.getElementById('emoji-popover');
    pop.style.display = pop.style.display === 'none' ? 'grid' : 'none';
  });

  document.addEventListener('click', (e) => {
    const pop = document.getElementById('emoji-popover');
    const btn = document.getElementById('emoji-btn');
    if (pop.style.display !== 'none' && !pop.contains(e.target) && e.target !== btn) {
      pop.style.display = 'none';
    }
  });

  renderEmojiPopover();

  // ── Draggable chat panel
  (function() {
    const panel = document.getElementById('chat-panel');
    const handle = panel.querySelector('.chat-header');
    let dragging = false, ox = 0, oy = 0;
    handle.addEventListener('mousedown', e => {
      dragging = true;
      const r = panel.getBoundingClientRect();
      ox = e.clientX - r.left; oy = e.clientY - r.top;
      panel.style.right = 'auto';
      panel.style.bottom = 'auto';
    });
    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      panel.style.left = (e.clientX - ox) + 'px';
      panel.style.top  = (e.clientY - oy) + 'px';
    });
    document.addEventListener('mouseup', () => { dragging = false; });
  })();

  // ══════════════════════════════════════════════════════════════
  // SESSION CAPTURE + GREETING — same passive pattern as
  // advisor-board.html/gm-board.html, scoped to role='owner'.
  // Passive identity only — never blocks the board from loading or
  // functioning. If nothing is known, no greeting shows, nothing else changes.
  // ══════════════════════════════════════════════════════════════
  (async function captureSessionAndGreet() {
    const SESSION_PHONE_KEY = 'ownerBoardPhone';

    async function renderGreeting(phone) {
      if (!phone) return;
      const { data: emp } = await db.from('employees').select('name, photo_url, role').eq('phone', phone).maybeSingle();
      if (!emp) return;
      CHAT_IDENTITY = { name: emp.name, role: emp.role };
      const avatar = emp.photo_url
        ? `<img class="greeting-avatar" src="${esc(emp.photo_url)}" alt="">`
        : `<div class="greeting-avatar-fallback">${esc((emp.name || '?').trim().charAt(0).toUpperCase() || '?')}</div>`;
      const wrap = document.getElementById('greetingWrap');
      wrap.innerHTML = `${avatar}<span>Hi, ${esc(emp.name)}</span>`;
      wrap.style.display = 'flex';
    }

    let phone = null;

    // Fresh passthrough from CrisData: ?u=phone&p=pin
    const params = new URLSearchParams(window.location.search);
    const passPhone = params.get('u');
    const passPin = params.get('p');
    if (passPhone && passPin) {
      const { data: match } = await db
        .from('employees').select('phone')
        .eq('phone', passPhone).eq('pin', passPin).eq('active', true).eq('role', 'owner')
        .maybeSingle();
      if (match) {
        phone = match.phone;
        localStorage.setItem(SESSION_PHONE_KEY, phone);
        window.history.replaceState({}, '', window.location.pathname);
      }
    }

    // Restore a persisted session if no fresh passthrough matched
    if (!phone) {
      phone = localStorage.getItem(SESSION_PHONE_KEY);
    }

    if (phone) {
      await renderGreeting(phone);
    }
    // No match anywhere: board already loaded normally above, just no greeting.
  })();
</script>
</body>
</html>
