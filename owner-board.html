<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lee Transmission — Owner Board</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#5b5ef4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CrisData">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<script src="/shared/pwa-register.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="shared/board-settings.js"></script>
<script src="shared/catch-moment.js"></script>
<script src="shared/team-chat.js"></script>
<script src="shared/push.js"></script>
<link rel="stylesheet" href="shared/board-shell.css">
<style>
  /* ── CONTENT ── */
  .content { padding: 24px 28px; }

  /* ── TEAM CHAT WIDGET ── */
  .chat-bubble {
    position: fixed; bottom: 28px; right: 28px; z-index: 9000;
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; cursor: pointer;
    box-shadow: 0 4px 16px rgba(91,94,244,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    user-select: none;
  }
  .chat-bubble:hover { transform: scale(1.07); box-shadow: 0 6px 20px rgba(91,94,244,0.45); }
  .chat-unread {
    position: absolute; top: -3px; right: -3px;
    width: 17px; height: 17px; border-radius: 50%;
    background: #ef4444; color: #fff;
    font-size: 0.6rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid #fff;
  }
  .chat-panel {
    position: fixed; bottom: 88px; right: 28px; z-index: 8999;
    width: 320px; max-height: 420px;
    background: #fff; border: 1px solid var(--border);
    border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.13);
    display: none; flex-direction: column; overflow: hidden;
  }
  .chat-panel.open { display: flex; }
  .chat-header {
    padding: 12px 16px; background: var(--accent); color: #fff;
    font-size: 0.82rem; font-weight: 700; letter-spacing: 0.5px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: move; user-select: none;
  }
  .chat-close { cursor: pointer; opacity: 0.8; font-size: 1rem; }
  .chat-close:hover { opacity: 1; }
  .chat-channels {
    display: flex; gap: 6px; padding: 8px 12px;
    border-bottom: 1px solid var(--border); background: #fff;
  }
  .chat-channel-btn {
    flex: 1; font-size: 0.66rem; font-weight: 700; padding: 6px 4px;
    border-radius: 6px; border: 1px solid var(--border); background: var(--bg);
    color: var(--muted); cursor: pointer; text-align: center; transition: all 0.15s;
  }
  .chat-channel-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .chat-channel-btn:hover:not(.active) { background: var(--surface-2); }
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 8px;
    background: #f8f9fc;
  }
  .chat-msg { max-width: 82%; display: flex; flex-direction: column; }
  .chat-msg.me { align-self: flex-end; align-items: flex-end; }
  .chat-msg.them { align-self: flex-start; align-items: flex-start; }
  .chat-msg-sender { font-size: 0.65rem; font-weight: 700; color: #8c93a8; margin-bottom: 2px; padding: 0 4px; }
  .chat-msg-bubble { padding: 8px 12px; border-radius: 14px; font-size: 0.83rem; line-height: 1.45; }
  .chat-msg.me .chat-msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .chat-msg.them .chat-msg-bubble { background: #fff; color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .chat-msg-time { font-size: 0.62rem; color: #8c93a8; margin-top: 3px; padding: 0 4px; }
  .chat-input-row {
    display: flex; gap: 8px; padding: 10px 12px;
    border-top: 1px solid var(--border); background: #fff;
  }
  .chat-input-row input {
    flex: 1; font-size: 0.82rem; padding: 7px 10px;
    border-radius: 20px; background: #f0f1f7;
    border: 1px solid var(--border); outline: none;
    font-family: inherit;
  }
  .chat-input-row input:focus { border-color: var(--accent); }
  .emoji-picker-wrap { position: relative; flex-shrink: 0; }
  .emoji-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: #f0f1f7; border: 1px solid var(--border);
    cursor: pointer; font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .emoji-btn:hover { background: var(--surface-2); }
  .emoji-popover {
    position: absolute; bottom: 42px; left: 0;
    width: 216px; max-height: 176px; overflow-y: auto;
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    padding: 8px; z-index: 10;
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px;
  }
  .emoji-popover button {
    background: none; border: none; font-size: 1.15rem; cursor: pointer;
    padding: 4px; border-radius: 6px; line-height: 1.3;
  }
  .emoji-popover button:hover { background: var(--surface-2); }
  .chat-send-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--accent); color: #fff;
    border: none; cursor: pointer; font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity 0.15s;
  }
  .chat-send-btn:hover { opacity: 0.85; }

  .chat-toast-container {
    position: fixed; top: 16px; right: 16px; z-index: 9999;
    display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
  }
  .chat-toast {
    pointer-events: auto;
    background: #1a1f36; color: #fff;
    border-radius: 10px; padding: 10px 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    min-width: 220px; max-width: 320px;
    font-size: 0.8rem; cursor: pointer;
    animation: chatToastIn 0.2s ease-out;
  }
  .chat-toast-channel { font-size: 0.62rem; color: #8c93a8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; font-weight: 700; }
  .chat-toast-sender { font-weight: 700; margin-bottom: 2px; }
  .chat-toast-msg { color: #e2e5ee; line-height: 1.4; overflow-wrap: anywhere; }
  @keyframes chatToastIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Marketing Content tab ── */
  .mkt-tools { display: flex; flex-direction: column; gap: 14px; }
  .mkt-tool { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .mkt-tool-hint { font-size: 0.78rem; color: var(--muted); }
  .mkt-yt { align-items: stretch; }
  .mkt-yt input {
    flex: 1; min-width: 160px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 11px; font-size: 0.85rem; color: var(--text); outline: none; font-family: inherit;
  }
  .mkt-yt input:focus { border-color: var(--accent); }
  .mkt-tool-status { font-size: 0.8rem; margin-top: 10px; min-height: 16px; }
  .mkt-tool-status.ok { color: #15803d; } .mkt-tool-status.err { color: var(--red); } .mkt-tool-status.wait { color: var(--accent); }
  .mkt-count { margin-left: 8px; font-size: 0.78rem; color: var(--muted); font-weight: 600; }

  .mkt-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .mkt-empty { color: var(--muted); font-size: 0.82rem; padding: 16px; grid-column: 1 / -1; text-align: center; }
  .mkt-item { position: relative; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; background: #fff; }
  .mkt-thumb {
    position: relative; width: 100%; aspect-ratio: 4 / 3; background: #eef0f5;
    display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden;
  }
  .mkt-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .mkt-thumb .mkt-play {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 2.2rem; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.55); pointer-events: none;
  }
  .mkt-thumb .mkt-badge {
    position: absolute; top: 6px; left: 6px; font-size: 0.58rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.4px; background: rgba(20,22,40,0.72); color: #fff; border-radius: 4px; padding: 2px 6px;
  }
  .mkt-loading { color: var(--muted); font-size: 0.72rem; }
  .mkt-meta { padding: 8px 10px; }
  .mkt-meta .mkt-caption { font-size: 0.8rem; color: var(--text); line-height: 1.35; margin-bottom: 3px; overflow-wrap: anywhere; }
  .mkt-meta .mkt-byline { font-size: 0.7rem; color: var(--muted); }
  .mkt-del {
    position: absolute; top: 6px; right: 6px; width: 24px; height: 24px; border-radius: 6px;
    border: none; background: rgba(20,22,40,0.6); color: #fff; font-size: 0.95rem; line-height: 1; cursor: pointer;
  }
  .mkt-del:hover { background: var(--red); }

  .mkt-viewer {
    display: none; position: fixed; inset: 0; z-index: 7000; background: rgba(10,12,20,0.92);
    align-items: center; justify-content: center; padding: 24px;
  }
  .mkt-viewer.open { display: flex; }
  .mkt-viewer-inner { max-width: 92vw; max-height: 88vh; display: flex; }
  .mkt-viewer-inner img, .mkt-viewer-inner video { max-width: 92vw; max-height: 88vh; border-radius: 8px; }
  .mkt-viewer-inner iframe { width: min(90vw, 960px); height: min(50.6vw, 540px); border: 0; border-radius: 8px; }
  .mkt-viewer-close {
    position: absolute; top: 18px; right: 22px; background: none; border: none; color: #fff;
    font-size: 2rem; cursor: pointer; line-height: 1;
  }
  @media (max-width: 768px) {
    .mkt-gallery { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
    .mkt-yt input { min-width: 0; }
  }
</style>
</head>
<body>

<div class="app-shell">
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-title">Lee Transmission</div>
      <div class="sidebar-brand-sub">Owner Board · Prototype</div>
    </div>
    <div class="sidebar-status">
      <div class="greeting-wrap" id="greetingWrap"></div>
      <div class="live-badge"><div class="live-dot"></div>Live</div>
    </div>
    <div class="sidebar-scroll">
      <div class="sidebar-group">
        <div class="sidebar-group-label">Main</div>
        <div class="sidebar-item active" data-view="todo" data-label="To-Do"><span class="icon">✅</span>To-Do</div>
        <div class="sidebar-item" data-view="marketing" data-label="Marketing Content"><span class="icon">📸</span>Marketing Content</div>
      </div>
    </div>
  </nav>

  <main class="main-area">
    <div class="view-topbar">
      <button type="button" class="mobile-nav-toggle" id="mobileNavToggle" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <div class="view-topbar-title" id="viewTopbarTitle">To-Do</div>
    </div>

    <div class="content">

  <!-- ══ TO-DO ══ -->
  <div class="view active" id="view-todo">
    <div class="card">
      <div class="card-title"><div class="dot"></div>To-Do</div>
      <div class="todo-add-bar">
        <input type="text" id="todoTextInput" placeholder="Add a to-do…">
        <select id="todoAssignInput">
          <option value="">Assign to… (optional)</option>
        </select>
        <button class="btn btn-primary" id="todoAddBtn">+ Add</button>
      </div>
      <div class="todo-form-error" id="todoFormError"></div>
      <div class="todo-list" id="todoList">
        <div style="color:var(--muted);padding:24px;text-align:center">Loading…</div>
      </div>
    </div>
  </div>

  <!-- ══ MARKETING CONTENT ══ -->
  <div class="view" id="view-marketing">
    <div class="card">
      <div class="card-title"><div class="dot" style="background:var(--accent)"></div>Add to the library</div>
      <div class="mkt-tools">
        <div class="mkt-tool">
          <button class="btn btn-primary" id="mktBulkPhotoBtn">⬆ Bulk upload photos</button>
          <input type="file" accept="image/*" multiple id="mktBulkPhotoInput" style="display:none">
          <span class="mkt-tool-hint">Add several photos at once.</span>
        </div>
        <div class="mkt-tool mkt-yt">
          <input type="text" id="mktYtUrl" placeholder="Paste a YouTube link (unlisted is fine)…">
          <input type="text" id="mktYtCaption" placeholder="Caption (optional)">
          <button class="btn btn-primary" id="mktYtAddBtn">+ Add video link</button>
        </div>
      </div>
      <div class="mkt-tool-status" id="mktToolStatus"></div>
    </div>

    <div class="card">
      <div class="card-title"><div class="dot" style="background:var(--green)"></div>Pictures <span class="mkt-count" id="mktPhotoCount"></span></div>
      <div class="mkt-gallery" id="mktPhotoGallery"><div class="mkt-empty">Loading…</div></div>
    </div>

    <div class="card">
      <div class="card-title"><div class="dot" style="background:var(--red)"></div>Videos <span class="mkt-count" id="mktVideoCount"></span></div>
      <div class="mkt-gallery" id="mktVideoGallery"><div class="mkt-empty">Loading…</div></div>
    </div>
  </div>

    </div>
  </main>
</div>

<!-- Team Chat Widget -->
<div class="chat-bubble" id="chat-bubble">
  💬
  <div class="chat-unread" id="chat-unread" style="display:none"></div>
</div>
<div class="chat-panel" id="chat-panel">
  <div class="chat-header">
    <span>Team Chat</span>
    <span class="chat-close" id="chat-close">✕</span>
  </div>
  <div class="chat-channels" id="chat-channels"></div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-row">
    <div class="emoji-picker-wrap">
      <button class="emoji-btn" id="emoji-btn" type="button" title="Emoji">😊</button>
      <div class="emoji-popover" id="emoji-popover" style="display:none"></div>
    </div>
    <input type="text" id="chat-input" placeholder="Message…" />
    <button class="chat-send-btn" id="chat-send">➤</button>
  </div>
</div>

<!-- Marketing viewer — full photo / video player -->
<div class="mkt-viewer" id="mktViewer">
  <button class="mkt-viewer-close" id="mktViewerClose" aria-label="Close">&times;</button>
  <div class="mkt-viewer-inner" id="mktViewerInner"></div>
</div>

<script>
  // ── Supabase
  const SUPABASE_URL = 'https://hygemiszxwmyrkmhbjub.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_8o9Df7K_DGpQ3s6yUCDq-A_HMh4Zllo';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  BoardSettings.init({
    db, targetSelector: '.main-area', mountSelector: '.sidebar-status',
    onNameSaved: (name) => { CHAT_IDENTITY.name = name; },
    // Owner board: may edit money settings (tax %, labor rate) and the
    // operational toggle. (CrisData Shop / RO settings.)
    canEditShopMoney: true,
    canEditShopOps: true,
  });

  // "Catch this moment" capture FAB — lands in this board's Marketing tab.
  CatchMoment.init({ db, getName: () => CHAT_IDENTITY.name });

  function esc(s) { return (s || '').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

  // ── VIEW REFRESH REGISTRY — connection-health safety net (see bottom
  // of file). Each view's section below registers its own
  // { refetch, getChannel, resubscribe } as it sets itself up.
  const VIEW_REFRESH = {};
  let currentViewKey = 'todo';

  // ── Sidebar navigation (single "To-Do" item today; same pattern as
  // the other 3 boards so future views drop in the same way).
  document.querySelectorAll('.sidebar-item[data-view]').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.sidebar-item[data-view]').forEach(i => i.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      item.classList.add('active');
      document.getElementById('view-' + item.dataset.view).classList.add('active');
      document.getElementById('viewTopbarTitle').textContent = item.dataset.label || item.textContent.trim();
      currentViewKey = item.dataset.view;
      closeMobileNav();
    });
  });

  // ── Mobile nav drawer (hamburger + backdrop). Inert on desktop — the
  // CSS driving .sidebar.open only exists inside the shared shell's
  // ≤768px media query.
  function openMobileNav() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebarBackdrop').classList.add('open');
  }
  function closeMobileNav() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarBackdrop').classList.remove('open');
  }
  document.getElementById('mobileNavToggle').addEventListener('click', openMobileNav);
  document.getElementById('sidebarBackdrop').addEventListener('click', closeMobileNav);

  // ══════════════════════════════════════════════════════════════
  // TO-DO — personal + assignable to-do list. Visible items: anything
  // you created (personal or delegated to someone else — kept visible
  // to you as the creator, tagged "Assigned to X") plus anything
  // assigned to you by anyone else (tagged "Assigned by X"). Completed
  // items stay
  // visible for TODO_VISIBLE_DAYS, then drop out of the query (never
  // deleted — completed_at just stops matching the window). Not
  // started here — every query is scoped to CURRENT_EMPLOYEE_ID,
  // which isn't known until captureSessionAndGreet() resolves below;
  // actual init calls live inside that function's renderGreeting().
  // ══════════════════════════════════════════════════════════════
  const TODO_VISIBLE_DAYS = 3;
  let todoRows = [];
  let todoChannel = null;

  async function loadTodoAssignees() {
    const sel = document.getElementById('todoAssignInput');
    if (!sel) return;
    const current = sel.value;
    sel.innerHTML = '<option value="">Assign to… (optional)</option>';
    const { data, error } = await db.from('employees').select('id, name').eq('active', true).order('name');
    if (error) { console.error('[Todo] load employees failed', error); return; }
    (data || []).forEach(e => {
      if (e.id === CURRENT_EMPLOYEE_ID) return; // assigning to yourself is just a personal to-do — leave it unset instead
      const opt = document.createElement('option');
      opt.value = e.id;
      opt.textContent = e.name;
      sel.appendChild(opt);
    });
    sel.value = current;
  }

  function formatTodoCompletedWhen(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' at ' +
      d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  async function loadAndRenderTodos() {
    const box = document.getElementById('todoList');
    if (!box) return;
    if (!CURRENT_EMPLOYEE_ID) {
      box.innerHTML = '<div class="todo-empty">Could not identify you on this board yet — try reopening it from CrisData.</div>';
      return;
    }
    const cutoff = new Date(Date.now() - TODO_VISIBLE_DAYS * 24 * 60 * 60 * 1000).toISOString();
    const { data, error } = await db.from('todos')
      .select('*')
      .or(`assigned_to.eq.${CURRENT_EMPLOYEE_ID},created_by.eq.${CURRENT_EMPLOYEE_ID}`)
      .or(`completed_at.is.null,completed_at.gte.${cutoff}`)
      .order('created_at', { ascending: false });
    if (error) { console.error('[Todo] load failed', error); return; }
    todoRows = data || [];
    renderTodos();
  }

  function renderTodos() {
    const box = document.getElementById('todoList');
    if (!box) return;
    if (todoRows.length === 0) {
      box.innerHTML = '<div class="todo-empty">No to-dos right now.</div>';
      return;
    }
    box.innerHTML = todoRows.map(t => {
      const isCompleted = !!t.completed_at;
      const canManage = t.created_by === CURRENT_EMPLOYEE_ID || t.assigned_to === CURRENT_EMPLOYEE_ID;
      let tag = '';
      if (t.assigned_to && t.created_by === CURRENT_EMPLOYEE_ID) {
        tag = `<span class="todo-tag assigned-to">Assigned to ${esc(t.assigned_to_name || '—')}</span>`;
      } else if (t.assigned_to === CURRENT_EMPLOYEE_ID && t.created_by !== CURRENT_EMPLOYEE_ID) {
        tag = `<span class="todo-tag assigned-by">Assigned by ${esc(t.created_by_name || '—')}</span>`;
      }
      const completedNote = isCompleted
        ? `<span class="todo-completed-note">Completed ${formatTodoCompletedWhen(t.completed_at)}</span>` : '';
      return `
        <div class="todo-item${isCompleted ? ' completed' : ''}" data-id="${esc(t.id)}">
          <input type="checkbox" class="todo-checkbox" ${isCompleted ? 'checked' : ''}>
          <div class="todo-body">
            <div class="todo-text">${esc(t.text)}</div>
            <div class="todo-meta">${tag}${completedNote}</div>
          </div>
          ${canManage ? `
          <div class="todo-actions">
            <button type="button" class="todo-action-btn todo-edit-btn" title="Edit">✏️</button>
            <button type="button" class="todo-action-btn danger todo-delete-btn" title="Delete">🗑️</button>
          </div>` : ''}
        </div>`;
    }).join('');

    box.querySelectorAll('.todo-checkbox').forEach(cb => {
      cb.addEventListener('change', () => toggleTodoComplete(cb.closest('.todo-item').dataset.id, cb.checked));
    });
    box.querySelectorAll('.todo-edit-btn').forEach(btn => {
      btn.addEventListener('click', () => startEditTodo(btn.closest('.todo-item').dataset.id));
    });
    box.querySelectorAll('.todo-delete-btn').forEach(btn => {
      btn.addEventListener('click', () => deleteTodo(btn.closest('.todo-item').dataset.id));
    });
  }

  async function toggleTodoComplete(id, completed) {
    const { error } = await db.from('todos')
      .update({ completed_at: completed ? new Date().toISOString() : null })
      .eq('id', id);
    if (error) { console.error('[Todo] toggle failed', error); alert('Could not update: ' + error.message); return; }
    loadAndRenderTodos();
  }

  function startEditTodo(id) {
    const row = todoRows.find(t => String(t.id) === String(id));
    const bodyEl = document.querySelector(`.todo-item[data-id="${id}"] .todo-text`);
    if (!row || !bodyEl) return;
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'todo-edit-input';
    input.value = row.text;
    bodyEl.replaceWith(input);
    input.focus();
    input.select();

    let done = false;
    const save = async () => {
      if (done) return;
      done = true;
      const newText = input.value.trim();
      if (!newText || newText === row.text) { renderTodos(); return; }
      const { error } = await db.from('todos').update({ text: newText }).eq('id', id);
      if (error) { console.error('[Todo] edit failed', error); alert('Could not save: ' + error.message); }
      loadAndRenderTodos();
    };
    input.addEventListener('blur', save);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') input.blur();
      if (e.key === 'Escape') { done = true; renderTodos(); }
    });
  }

  async function deleteTodo(id) {
    if (!confirm('Delete this to-do?')) return;
    const { error } = await db.from('todos').delete().eq('id', id);
    if (error) { console.error('[Todo] delete failed', error); alert('Could not delete: ' + error.message); return; }
    loadAndRenderTodos();
  }

  async function addTodo() {
    const textInput = document.getElementById('todoTextInput');
    const assignSel = document.getElementById('todoAssignInput');
    const errEl = document.getElementById('todoFormError');
    errEl.textContent = '';
    const text = textInput.value.trim();
    if (!text) { errEl.textContent = 'Enter a to-do.'; return; }
    if (!CURRENT_EMPLOYEE_ID) { errEl.textContent = 'Could not identify you on this board yet.'; return; }

    const assignedId = assignSel.value || null;
    const assignedName = assignedId ? assignSel.options[assignSel.selectedIndex].textContent : null;

    const addBtn = document.getElementById('todoAddBtn');
    addBtn.disabled = true;

    const { error } = await db.from('todos').insert({
      text,
      created_by: CURRENT_EMPLOYEE_ID,
      created_by_name: CHAT_IDENTITY.name || null,
      assigned_to: assignedId,
      assigned_to_name: assignedName,
    });

    addBtn.disabled = false;
    if (error) { console.error('[Todo] add failed', error); errEl.textContent = 'Save failed: ' + error.message; return; }

    textInput.value = '';
    assignSel.value = '';
    loadAndRenderTodos();
  }

  document.getElementById('todoAddBtn').addEventListener('click', addTodo);
  document.getElementById('todoTextInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

  function todoSubscribeRealtime() {
    if (todoChannel) db.removeChannel(todoChannel);
    todoChannel = db.channel('owner-board-todos-live')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'todos' }, loadAndRenderTodos)
      .subscribe();
  }
  VIEW_REFRESH.todo = {
    refetch: loadAndRenderTodos,
    getChannel: () => todoChannel,
    resubscribe: todoSubscribeRealtime,
  };

  // ══════════════════════════════════════════════════════════════
  // MARKETING CONTENT — where "Catch this moment" captures land + where
  // Cris consolidates his scattered marketing. Two galleries (Pictures,
  // Videos). File items (photos + short clips) live in the private
  // marketing-content bucket (signed URLs); video LINKS point to YouTube
  // (thumbnail + embed). Owner-only; live via realtime.
  // ══════════════════════════════════════════════════════════════
  const MKT_BUCKET = 'marketing-content';
  const MKT_TTL = 3600;
  let marketingRows = [];
  let marketingChannel = null;
  let mktBusy = false;

  function ytId(url) {
    if (!url) return null;
    const patterns = [
      /youtu\.be\/([A-Za-z0-9_-]{11})/,
      /[?&]v=([A-Za-z0-9_-]{11})/,
      /youtube\.com\/shorts\/([A-Za-z0-9_-]{11})/,
      /youtube\.com\/embed\/([A-Za-z0-9_-]{11})/,
    ];
    for (const re of patterns) { const m = url.match(re); if (m) return m[1]; }
    return null;
  }
  function fmtMktDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  async function loadMarketing() {
    try {
      const { data, error } = await db.from('marketing_content').select('*').order('captured_at', { ascending: false });
      if (error) throw error;
      marketingRows = data || [];
    } catch (err) {
      console.warn('[Marketing] load failed (migration not run?):', err.message || err);
      const note = '<div class="mkt-empty">Run the marketing_content migration to enable this tab.</div>';
      document.getElementById('mktPhotoGallery').innerHTML = note;
      document.getElementById('mktVideoGallery').innerHTML = '';
      document.getElementById('mktPhotoCount').textContent = '';
      document.getElementById('mktVideoCount').textContent = '';
      return;
    }
    await renderMarketing();
  }

  async function renderMarketing() {
    const photos = marketingRows.filter(r => r.media_type === 'photo');
    const videos = marketingRows.filter(r => r.media_type === 'video');
    document.getElementById('mktPhotoCount').textContent = photos.length ? `(${photos.length})` : '';
    document.getElementById('mktVideoCount').textContent = videos.length ? `(${videos.length})` : '';

    // Batch-sign the file items' paths.
    const filePaths = marketingRows.filter(r => r.storage === 'file' && r.file_path).map(r => r.file_path);
    let signedMap = {};
    if (filePaths.length) {
      try {
        const { data: signed } = await db.storage.from(MKT_BUCKET).createSignedUrls(filePaths, MKT_TTL);
        (signed || []).forEach(s => { if (s && s.path && s.signedUrl) signedMap[s.path] = s.signedUrl; });
      } catch (e) { console.warn('[Marketing] signing failed', e); }
    }

    renderGallery('mktPhotoGallery', photos, signedMap, 'No pictures yet — hit "Catch this moment" on any board.');
    renderGallery('mktVideoGallery', videos, signedMap, 'No videos yet — capture a clip or add a YouTube link above.');
  }

  function renderGallery(elId, rows, signedMap, emptyMsg) {
    const el = document.getElementById(elId);
    if (rows.length === 0) { el.innerHTML = `<div class="mkt-empty">${esc(emptyMsg)}</div>`; return; }
    el.innerHTML = rows.map(r => {
      const isYt = r.storage === 'youtube';
      const yid = isYt ? ytId(r.youtube_url) : null;
      let thumbInner, badge = '';
      if (r.media_type === 'video') {
        badge = '<span class="mkt-badge">Video</span>';
        if (isYt && yid) {
          thumbInner = `<img src="https://img.youtube.com/vi/${esc(yid)}/hqdefault.jpg" alt=""><span class="mkt-play">▶</span>`;
        } else {
          thumbInner = `<span style="font-size:2rem">🎬</span><span class="mkt-play">▶</span>`;
        }
      } else {
        const url = signedMap[r.file_path];
        thumbInner = url ? `<img src="${esc(url)}" alt="">` : '<span class="mkt-loading">…</span>';
      }
      const cap = r.caption ? `<div class="mkt-caption">${esc(r.caption)}</div>` : '';
      const by = [r.captured_by || 'Someone', fmtMktDate(r.captured_at)].filter(Boolean).join(' · ');
      return `
        <div class="mkt-item" data-id="${esc(r.id)}">
          <div class="mkt-thumb" data-id="${esc(r.id)}">${thumbInner}${badge}</div>
          <button class="mkt-del" data-id="${esc(r.id)}" title="Delete">×</button>
          <div class="mkt-meta">${cap}<div class="mkt-byline">${esc(by)}</div></div>
        </div>`;
    }).join('');

    el.querySelectorAll('.mkt-thumb').forEach(t => t.addEventListener('click', () => openViewer(t.dataset.id, signedMap)));
    el.querySelectorAll('.mkt-del').forEach(b => b.addEventListener('click', (e) => { e.stopPropagation(); deleteMarketing(b.dataset.id); }));
  }

  function openViewer(id, signedMap) {
    const r = marketingRows.find(x => String(x.id) === String(id));
    if (!r) return;
    const inner = document.getElementById('mktViewerInner');
    if (r.media_type === 'video') {
      const yid = r.storage === 'youtube' ? ytId(r.youtube_url) : null;
      if (yid) inner.innerHTML = `<iframe src="https://www.youtube.com/embed/${esc(yid)}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
      else {
        const url = signedMap[r.file_path];
        inner.innerHTML = url ? `<video src="${esc(url)}" controls autoplay playsinline></video>` : '<div style="color:#fff">Clip unavailable.</div>';
      }
    } else {
      const url = signedMap[r.file_path];
      inner.innerHTML = url ? `<img src="${esc(url)}" alt="">` : '<div style="color:#fff">Image unavailable.</div>';
    }
    document.getElementById('mktViewer').classList.add('open');
  }
  function closeViewer() {
    document.getElementById('mktViewer').classList.remove('open');
    document.getElementById('mktViewerInner').innerHTML = '';  // stops any playing media
  }
  document.getElementById('mktViewerClose').addEventListener('click', closeViewer);
  document.getElementById('mktViewer').addEventListener('click', (e) => { if (e.target.id === 'mktViewer') closeViewer(); });

  async function deleteMarketing(id) {
    const r = marketingRows.find(x => String(x.id) === String(id));
    if (!r) return;
    if (!confirm('Delete this item? This can\'t be undone.')) return;
    try {
      if (r.storage === 'file' && r.file_path) {
        const { error: sErr } = await db.storage.from(MKT_BUCKET).remove([r.file_path]);
        if (sErr) throw sErr;  // remove the object first, then the row
      }
      const { error } = await db.from('marketing_content').delete().eq('id', id);
      if (error) throw error;
      loadMarketing();
    } catch (err) {
      console.error('[Marketing] delete failed', err);
      alert('Delete failed: ' + (err.message || 'unknown error'));
    }
  }

  function mktStatus(msg, cls) {
    const el = document.getElementById('mktToolStatus');
    el.textContent = msg || '';
    el.className = 'mkt-tool-status' + (cls ? ' ' + cls : '');
  }

  // Bulk photo upload (multi-file)
  async function bulkUploadPhotos(files) {
    if (mktBusy || !files || !files.length) return;
    mktBusy = true;
    let ok = 0, fail = 0;
    for (const file of files) {
      if (!file.type.startsWith('image/') || !file.size) { fail++; continue; }
      mktStatus(`Uploading ${ok + fail + 1} of ${files.length}…`, 'wait');
      try {
        const id = crypto.randomUUID();
        const now = new Date();
        const yyyyMm = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        const ext = (file.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g, '') || 'jpg';
        const path = `photos/${yyyyMm}/${id}.${ext}`;
        const { error: upErr } = await db.storage.from(MKT_BUCKET).upload(path, file, { upsert: false });
        if (upErr) throw upErr;
        const { error: insErr } = await db.from('marketing_content').insert({
          media_type: 'photo', storage: 'file', file_path: path,
          captured_by: CHAT_IDENTITY.name || null, captured_at: new Date().toISOString(),
        });
        if (insErr) throw insErr;
        ok++;
      } catch (err) { console.error('[Marketing] bulk upload failed', err); fail++; }
    }
    mktBusy = false;
    mktStatus(`Uploaded ${ok}${fail ? `, ${fail} failed` : ''} ✓`, fail ? 'err' : 'ok');
    loadMarketing();
  }

  async function addYoutube() {
    const urlEl = document.getElementById('mktYtUrl');
    const capEl = document.getElementById('mktYtCaption');
    const url = urlEl.value.trim();
    if (!url) return;
    if (!ytId(url)) { mktStatus('That doesn\'t look like a YouTube link.', 'err'); return; }
    const btn = document.getElementById('mktYtAddBtn');
    btn.disabled = true;
    try {
      const { error } = await db.from('marketing_content').insert({
        media_type: 'video', storage: 'youtube', youtube_url: url,
        caption: capEl.value.trim() || null,
        captured_by: CHAT_IDENTITY.name || null, captured_at: new Date().toISOString(),
      });
      if (error) throw error;
      urlEl.value = ''; capEl.value = '';
      mktStatus('Video link added ✓', 'ok');
      loadMarketing();
    } catch (err) {
      console.error('[Marketing] add youtube failed', err);
      mktStatus('Failed: ' + (err.message || 'unknown error'), 'err');
    } finally {
      btn.disabled = false;
    }
  }

  document.getElementById('mktBulkPhotoBtn').addEventListener('click', () => document.getElementById('mktBulkPhotoInput').click());
  document.getElementById('mktBulkPhotoInput').addEventListener('change', async (e) => {
    const files = Array.from(e.target.files || []);
    if (files.length) await bulkUploadPhotos(files);
    e.target.value = '';  // reset AFTER (request-ordering fix)
  });
  document.getElementById('mktYtAddBtn').addEventListener('click', addYoutube);
  document.getElementById('mktYtUrl').addEventListener('keydown', e => { if (e.key === 'Enter') addYoutube(); });

  function marketingSubscribeRealtime() {
    if (marketingChannel) db.removeChannel(marketingChannel);
    marketingChannel = db.channel('owner-board-marketing-live')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'marketing_content' }, loadMarketing)
      .subscribe();
  }
  loadMarketing();
  marketingSubscribeRealtime();
  VIEW_REFRESH.marketing = {
    refetch: loadMarketing,
    getChannel: () => marketingChannel,
    resubscribe: marketingSubscribeRealtime,
  };

  // ── Team Chat (real, Supabase-backed — owner-board = Owner's view)
  // CHAT_IDENTITY is populated by captureSessionAndGreet() below once the
  // session's phone resolves against `employees`; sending is blocked until then.
  let CHAT_IDENTITY = { name: null, role: null };
  // Also populated by captureSessionAndGreet() — needed for the To-Do
  // created_by/assigned_to FKs.
  let CURRENT_EMPLOYEE_ID = null;

  const CHAT_CHANNELS = [
    { key: 'group',             label: 'Group' },
    { key: 'owner_manager',     label: 'Manager' },
    { key: 'owner_advisor',     label: 'Advisor' },
    { key: 'owner_bookkeeping', label: 'Bookkeeping' },
  ];
  // ── Team Chat — shared component (shared/team-chat.js). Owner-board keeps
  //    its own CHAT_CHANNELS + CHAT_IDENTITY (declared above) and its floating
  //    panel chrome below; the shared module renders inside the panel.
  const teamChat = initTeamChat({
    db,
    getIdentity: () => CHAT_IDENTITY,   // live getter — boards reassign CHAT_IDENTITY once the session resolves
    channels: CHAT_CHANNELS,
    mode: 'panel',
    badgeId: 'chat-unread',
    isSurfaceVisible: () => document.getElementById('chat-panel').classList.contains('open'),
  });

  // Notifications nudge (sub-slice 2b) — permission + subscription capture.
  CrisPush.initPush({ db, getIdentity: () => CHAT_IDENTITY });

  // Floating-panel chrome (owner-board only): the bubble toggles the panel and,
  // on open, marks the current channel read + unlocks audio + scrolls to bottom.
  document.getElementById('chat-bubble').addEventListener('click', () => {
    const panel = document.getElementById('chat-panel');
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) teamChat.onSurfaceShown();
  });
  document.getElementById('chat-close').addEventListener('click', e => {
    e.stopPropagation();
    document.getElementById('chat-panel').classList.remove('open');
  });

  // ── Draggable chat panel
  (function() {
    const panel = document.getElementById('chat-panel');
    const handle = panel.querySelector('.chat-header');
    let dragging = false, ox = 0, oy = 0;
    handle.addEventListener('mousedown', e => {
      dragging = true;
      const r = panel.getBoundingClientRect();
      ox = e.clientX - r.left; oy = e.clientY - r.top;
      panel.style.right = 'auto';
      panel.style.bottom = 'auto';
    });
    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      panel.style.left = (e.clientX - ox) + 'px';
      panel.style.top  = (e.clientY - oy) + 'px';
    });
    document.addEventListener('mouseup', () => { dragging = false; });
  })();

  // ══════════════════════════════════════════════════════════════
  // SESSION CAPTURE + GREETING — same passive pattern as
  // advisor-board.html/gm-board.html, scoped to role='owner'.
  // Passive identity only — never blocks the board from loading or
  // functioning. If nothing is known, no greeting shows, nothing else changes.
  // ══════════════════════════════════════════════════════════════
  (async function captureSessionAndGreet() {
    const SESSION_PHONE_KEY = 'ownerBoardPhone';

    async function renderGreeting(phone) {
      if (!phone) return;
      const { data: emp } = await db.from('employees').select('id, name, photo_url, role').eq('phone', phone).maybeSingle();
      if (!emp) return;
      CHAT_IDENTITY = { name: emp.name, role: emp.role };
      CURRENT_EMPLOYEE_ID = emp.id;
      BoardSettings.refresh(emp.id);
      const avatar = emp.photo_url
        ? `<img class="greeting-avatar" src="${esc(emp.photo_url)}" alt="">`
        : `<div class="greeting-avatar-fallback">${esc((emp.name || '?').trim().charAt(0).toUpperCase() || '?')}</div>`;
      const wrap = document.getElementById('greetingWrap');
      wrap.innerHTML = `${avatar}<span>Hi, ${esc(emp.name)}</span>`;
      wrap.style.display = 'flex';

      // To-Do queries are scoped to CURRENT_EMPLOYEE_ID, which just
      // resolved above — safe to start now.
      loadAndRenderTodos();
      loadTodoAssignees();
      todoSubscribeRealtime();
    }

    let phone = null;

    // Fresh passthrough from CrisData: ?u=phone&p=pin
    const params = new URLSearchParams(window.location.search);
    const passPhone = params.get('u');
    const passPin = params.get('p');
    if (passPhone && passPin) {
      const { data: match } = await db
        .from('employees').select('phone')
        .eq('phone', passPhone).eq('pin', passPin).eq('active', true).eq('role', 'owner')
        .maybeSingle();
      if (match) {
        phone = match.phone;
        localStorage.setItem(SESSION_PHONE_KEY, phone);
        window.history.replaceState({}, '', window.location.pathname);
      }
    }

    // Restore a persisted session if no fresh passthrough matched
    if (!phone) {
      phone = localStorage.getItem(SESSION_PHONE_KEY);
    }

    if (phone) {
      await renderGreeting(phone);
    }
    // No match anywhere: board already loaded normally above, just no greeting.
  })();

  // ══════════════════════════════════════════════════════════════
  // AUTO-REFRESH SAFETY NET — same pattern as the other 3 boards.
  // Realtime channels (registered into VIEW_REFRESH above) are the
  // primary update mechanism; this is only a fallback for when a
  // socket silently drops.
  // ══════════════════════════════════════════════════════════════
  (function initRefreshSafetyNet() {
    function refreshActiveView() {
      const entry = VIEW_REFRESH[currentViewKey];
      if (!entry || typeof entry.refetch !== 'function') return Promise.resolve();
      return Promise.resolve(entry.refetch());
    }
    function isChannelHealthy(channel) {
      return !!channel && channel.state === 'joined';
    }
    function checkActiveChannelHealth() {
      const entry = VIEW_REFRESH[currentViewKey];
      if (!entry || typeof entry.getChannel !== 'function') return;
      if (isChannelHealthy(entry.getChannel())) return;
      if (typeof entry.refetch === 'function') entry.refetch();
      if (typeof entry.resubscribe === 'function') entry.resubscribe();
    }
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') refreshActiveView();
    });
    window.addEventListener('focus', refreshActiveView);
    setInterval(checkActiveChannelHealth, 60 * 1000);
  })();
</script>
