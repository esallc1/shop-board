<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>My Numbers — Lee Transmission</title>
<style>
  :root{
    --asphalt:#1C1E1F;
    --panel:#25282A;
    --panel-raised:#2E3234;
    --stroke:#3A3E40;
    --paper:#ECEAE5;
    --gauge:#8B9296;
    --safety-orange:#FF6B1A;
    --safety-orange-dim:#8f3c14;
    --caution:#F2C94C;
    --go-green:#3FA34D;
    --hold-blue:#5B8DBE;
    --danger:#D64545;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%;}
  body{
    background:var(--asphalt);
    color:var(--paper);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  #app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    background:var(--asphalt);
    position:relative;
    display:flex;
    flex-direction:column;
    background-image:
      linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0) 120px);
  }
  .mono{ font-family:'JetBrains Mono','SF Mono',Consolas,monospace; letter-spacing:0.02em; }
  h1,h2,h3{ font-family:'Oswald','Arial Narrow',sans-serif; text-transform:uppercase; letter-spacing:0.03em; margin:0; }

  /* ---------- Topbar ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 18px 14px;
    border-bottom:1px solid var(--stroke);
    position:sticky; top:0; z-index:20;
    background:var(--asphalt);
  }
  .topbar .brand{ display:flex; flex-direction:column; gap:2px; }
  .topbar .brand small{ color:var(--gauge); font-size:11px; letter-spacing:0.12em; text-transform:uppercase; }
  .topbar .brand h1{ font-size:19px; color:var(--paper); }
  .topbar .brand h1 span{ color:var(--safety-orange); }
  .avatar-btn{
    width:40px; height:40px; border-radius:8px;
    background:var(--panel-raised); border:1px solid var(--stroke);
    color:var(--paper); font-family:'Oswald',sans-serif; font-weight:600;
    display:flex; align-items:center; justify-content:center; font-size:15px;
  }

  /* ---------- Tabs ---------- */
  .tabs{
    display:flex; gap:6px; padding:12px 18px 4px;
    position:sticky; top:73px; z-index:19; background:var(--asphalt);
  }
  .tab{
    flex:1; text-align:center; padding:9px 4px; border-radius:7px;
    font-size:12px; letter-spacing:0.06em; text-transform:uppercase;
    color:var(--gauge); background:var(--panel); border:1px solid var(--stroke);
    font-weight:600;
  }
  .tab.active{ background:var(--safety-orange); color:#1C1000; border-color:var(--safety-orange); }
  .tab .count{ opacity:0.7; font-weight:400; margin-left:3px; }

  /* ---------- Job list ---------- */
  .job-list{ padding:16px 16px 100px; display:flex; flex-direction:column; gap:14px; }
  .empty-state{ text-align:center; color:var(--gauge); padding:60px 20px; font-size:14px; line-height:1.6; }
  .empty-state h3{ color:var(--paper); font-size:16px; margin-bottom:8px; }

  .tag{
    background:var(--panel);
    border:1px solid var(--stroke);
    border-radius:10px;
    position:relative;
    padding:16px 16px 14px 18px;
    display:flex; flex-direction:column; gap:8px;
    border-left:5px solid var(--gauge);
  }
  .tag::before{
    content:''; position:absolute; left:-2px; top:22px;
    width:10px; height:10px; border-radius:50%;
    background:var(--asphalt); border:1px solid var(--stroke);
  }
  .tag.status-new{ border-left-color:var(--gauge); }
  .tag.status-diagnosing{ border-left-color:var(--caution); }
  .tag.status-waiting{ border-left-color:var(--hold-blue); }
  .tag.status-approved{ border-left-color:var(--go-green); }
  .tag.status-in_progress{ border-left-color:var(--safety-orange); }
  .tag.status-done{ border-left-color:var(--stroke); opacity:0.65; }

  .tag-top{ display:flex; justify-content:space-between; align-items:flex-start; }
  .tag-vehicle{ font-family:'Oswald',sans-serif; font-size:17px; letter-spacing:0.02em; }
  .tag-vin{ color:var(--gauge); font-size:11px; margin-top:2px; }
  .status-pill{
    font-size:10px; padding:4px 9px; border-radius:20px; font-weight:700;
    letter-spacing:0.06em; text-transform:uppercase; white-space:nowrap;
  }
  .status-pill.status-new{ background:#3a3e40; color:var(--paper); }
  .status-pill.status-diagnosing{ background:rgba(242,201,76,0.15); color:var(--caution); }
  .status-pill.status-waiting{ background:rgba(91,141,190,0.15); color:var(--hold-blue); }
  .status-pill.status-approved{ background:rgba(63,163,77,0.18); color:var(--go-green); }
  .status-pill.status-in_progress{ background:rgba(255,107,26,0.18); color:var(--safety-orange); }
  .status-pill.status-done{ background:rgba(255,255,255,0.05); color:var(--gauge); }

  .tag-complaint{ font-size:13.5px; color:var(--paper); line-height:1.45; }
  .tag-complaint b{ color:var(--gauge); font-weight:600; text-transform:uppercase; font-size:10.5px; letter-spacing:0.05em; display:block; margin-bottom:3px; }
  .tag-meta{ display:flex; justify-content:space-between; align-items:center; margin-top:2px; }
  .tag-customer{ font-size:12px; color:var(--gauge); }
  .repeat-flag{
    font-size:10.5px; color:var(--danger); font-weight:700; text-transform:uppercase;
    letter-spacing:0.04em; background:rgba(214,69,69,0.12); padding:3px 8px; border-radius:6px;
  }

  /* ---------- Buttons ---------- */
  .btn{
    display:block; width:100%; text-align:center; padding:14px;
    border-radius:9px; border:none; font-family:'Oswald',sans-serif;
    font-size:14px; letter-spacing:0.05em; text-transform:uppercase; font-weight:600;
    cursor:pointer;
  }
  .btn-primary{ background:var(--safety-orange); color:#1C1000; }
  .btn-go{ background:var(--go-green); color:#08210C; }
  .btn-outline{ background:transparent; border:1px solid var(--stroke); color:var(--paper); }
  .btn-ghost{ background:var(--panel-raised); color:var(--paper); border:1px solid var(--stroke); }
  .btn:disabled{ opacity:0.4; }
  .btn-row{ display:flex; gap:10px; }
  .btn-row .btn{ flex:1; }

  /* ---------- Detail view ---------- */
  .detail{ padding:0 0 110px; }
  .detail-hero{
    padding:20px 18px 18px; border-bottom:1px solid var(--stroke);
    display:flex; flex-direction:column; gap:6px;
  }
  .back-row{ display:flex; align-items:center; gap:10px; padding:14px 18px 0; }
  .back-btn{ background:none; border:none; color:var(--gauge); font-size:13px; padding:4px 0; display:flex; align-items:center; gap:5px; }
  .detail-hero h2{ font-size:22px; }
  .detail-vin{ color:var(--gauge); font-size:12.5px; }
  .detail-status-row{ display:flex; align-items:center; gap:10px; margin-top:6px; }

  .section{ padding:18px; border-bottom:1px solid var(--stroke); }
  .section h3{ font-size:12px; color:var(--gauge); letter-spacing:0.08em; margin-bottom:10px; }
  .complaint-box{
    background:var(--panel); border:1px solid var(--stroke); border-radius:9px;
    padding:14px; font-size:14px; line-height:1.55;
  }
  .history-hit{
    background:rgba(214,69,69,0.08); border:1px solid rgba(214,69,69,0.35);
    border-radius:9px; padding:12px 14px; font-size:13px; color:#F3B4B4; margin-bottom:12px;
    line-height:1.5;
  }
  .history-hit b{ color:var(--danger); }

  textarea{
    width:100%; min-height:100px; background:var(--panel); border:1px solid var(--stroke);
    border-radius:9px; color:var(--paper); padding:12px; font-size:14px; font-family:inherit;
    resize:vertical; line-height:1.5;
  }
  textarea:focus, input:focus{ outline:2px solid var(--safety-orange); outline-offset:1px; }

  .photo-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:10px; }
  .photo-thumb{
    aspect-ratio:1; border-radius:8px; overflow:hidden; background:var(--panel-raised);
    border:1px solid var(--stroke); position:relative;
  }
  .photo-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .photo-add{
    aspect-ratio:1; border-radius:8px; border:2px dashed var(--stroke);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--gauge); font-size:11px; gap:4px; text-transform:uppercase; letter-spacing:0.04em;
    text-align:center; cursor:pointer;
  }
  .photo-add .plus{ font-size:22px; line-height:1; color:var(--safety-orange); }
  input[type=file]{ display:none; }

  .sticky-cta{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:480px; padding:14px 18px calc(18px + env(safe-area-inset-bottom));
    background:linear-gradient(0deg, var(--asphalt) 60%, rgba(28,30,31,0));
    z-index:15;
  }

  /* ---------- Login ---------- */
  .login-wrap{
    min-height:100vh; display:flex; flex-direction:column; justify-content:center;
    padding:32px 26px; gap:26px;
  }
  .login-brand{ text-align:center; margin-bottom:6px; }
  .login-brand .stamp{
    display:inline-block; border:2px solid var(--safety-orange); color:var(--safety-orange);
    padding:8px 16px; font-family:'Oswald',sans-serif; letter-spacing:0.14em; font-size:12px;
    transform:rotate(-2deg); margin-bottom:16px; border-radius:4px;
  }
  .login-brand h1{ font-size:24px; color:var(--paper); }
  .login-brand p{ color:var(--gauge); font-size:13px; margin-top:6px; }
  .login-logo{ width:150px; height:auto; margin:0 auto 6px; display:block; }
  .login-form{ display:flex; flex-direction:column; gap:14px; }
  .field-label{ font-size:11px; color:var(--gauge); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px; display:block; }
  .field-input{
    width:100%; background:var(--panel); border:1px solid var(--stroke); border-radius:10px;
    color:var(--paper); padding:15px 14px; font-size:17px; font-family:'JetBrains Mono',monospace;
    letter-spacing:0.03em;
  }
  .login-error{ color:var(--danger); font-size:13px; text-align:center; min-height:16px; }

  /* ---------- Flag hours hero ---------- */
  .flag-hero{
    margin:16px 16px 4px; padding:20px 20px 18px; border-radius:12px;
    background:linear-gradient(160deg, var(--panel-raised), var(--panel));
    border:1px solid var(--stroke); position:relative; overflow:hidden;
  }
  .flag-hero::after{
    content:''; position:absolute; top:-40px; right:-40px; width:140px; height:140px;
    background:radial-gradient(circle, rgba(255,107,26,0.16), transparent 70%);
  }
  .flag-hero .label{ font-size:11px; color:var(--gauge); text-transform:uppercase; letter-spacing:0.1em; }
  .flag-hero .value{ font-family:'Oswald',sans-serif; font-size:44px; color:var(--paper); line-height:1.05; margin-top:4px; }
  .flag-hero .value span{ font-size:18px; color:var(--gauge); font-family:'Inter',sans-serif; margin-left:6px; }
  .flag-hero .sub{ font-size:12.5px; color:var(--gauge); margin-top:8px; }
  .flag-hero .sub b{ color:var(--safety-orange); }

  .toast{
    position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
    background:var(--panel-raised); border:1px solid var(--stroke); color:var(--paper);
    padding:11px 18px; border-radius:8px; font-size:13px; z-index:50; box-shadow:0 6px 20px rgba(0,0,0,0.4);
    opacity:0; pointer-events:none; transition:opacity 0.25s;
  }
  .toast.show{ opacity:1; }

  .lang-switch{ display:flex; gap:6px; justify-content:center; margin-top:16px; }
  .lang-btn{ padding:7px 13px; border-radius:20px; border:1px solid var(--stroke); background:var(--panel); color:var(--gauge); font-size:11px; font-weight:700; letter-spacing:0.04em; cursor:pointer; }
  .lang-btn.active{ background:var(--safety-orange); border-color:var(--safety-orange); color:#1C1000; }
  .lang-switch-top{ margin-top:0; justify-content:flex-start; gap:4px; }
  .lang-switch-top .lang-btn{ padding:5px 9px; font-size:9.5px; }

  ::-webkit-scrollbar{ width:0; height:0; }
</style>
</head>

/* ---------------- Storage helpers ---------------- */
async function sGet(key){
  try{ const r = await window.storage.get(key, true); return r ? JSON.parse(r.value) : null; }
  catch(e){ return null; }
}
async function sSet(key, value){
  try{ await window.storage.set(key, JSON.stringify(value), true); }
  catch(e){ console.error('storage set failed', e); }
}

function t(key){
  return (I18N[STATE.lang] && I18N[STATE.lang][key]) || I18N.en[key] || key;
}
function renderLangSwitch(topVariant){
  const langs = [['en','EN'],['es','ES'],['ht','KREYÒL']];
  return `<div class="lang-switch ${topVariant ? 'lang-switch-top' : ''}">
    ${langs.map(([code,label]) => `<div class="lang-btn ${STATE.lang===code?'active':''}" data-lang="${code}">${label}</div>`).join('')}
  </div>`;
}
function bindLangSwitch(){
  document.querySelectorAll('.lang-btn').forEach(el => {
    el.addEventListener('click', () => { STATE.lang = el.dataset.lang; render(); });
  });
}

let STATE = {
  techs: [],
  jobs: [],
  currentTechId: null,
  view: 'login', // login | list | detail
  activeJobId: null,
  activeTab: 'up_next',
  loginPhone: '',
  loginPin: '',
  loginError: '',
  lang: 'en'
};

async function initData(){
  let techs = await sGet('techs_v2');
  if(!techs){ techs = SEED_TECHS; await sSet('techs_v2', techs); }
  let jobs = await sGet('jobs_v2');
  if(!jobs){ jobs = SEED_JOBS; await sSet('jobs_v2', jobs); }
  STATE.techs = techs;
  STATE.jobs = jobs;
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 1800);
}

/* ---------------- Render root ---------------- */
function render(){
  const app = document.getElementById('app');
  if(STATE.view === 'login'){ app.innerHTML = renderLogin(); bindLogin(); }
  else if(STATE.view === 'list'){ app.innerHTML = renderList(); bindList(); }
  else if(STATE.view === 'detail'){ app.innerHTML = renderDetail(); bindDetail(); }
}

/* ---------------- LOGIN ---------------- */
function renderLogin(){
  return `

function bindLogin(){
  const phoneInput = document.getElementById('loginPhoneInput');
  const pinInput = document.getElementById('loginPinInput');
  phoneInput.addEventListener('input', (e) => {
    STATE.loginPhone = e.target.value.replace(/\D/g,'').slice(0,10);
  });
  pinInput.addEventListener('input', (e) => {
    STATE.loginPin = e.target.value.replace(/\D/g,'').slice(0,4);
  });
  document.getElementById('btnLogin').addEventListener('click', doLogin);
  pinInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') doLogin(); });
  bindLangSwitch();
}

function doLogin(){
  const phone = STATE.loginPhone;
  const pin = STATE.loginPin;
  const tech = STATE.techs.find(t => t.phone === phone && t.pin === pin);
  if(tech){
    STATE.currentTechId = tech.id;
    STATE.view = 'list';
    STATE.activeTab = 'up_next';
    STATE.loginPhone = '';
    STATE.loginPin = '';
    STATE.loginError = '';
    render();
  } else {
    STATE.loginError = t('loginErrorMsg');
    render();
  }
}

/* ---------------- LIST ---------------- */
function myJobs(){
  return STATE.jobs.filter(j => j.assignedTechId === STATE.currentTechId);
}
function jobsForTab(tab){
  const mine = myJobs();
  if(tab === 'up_next') return mine.filter(j => ['new','diagnosing','waiting','approved','in_progress'].includes(j.status));
  if(tab === 'history') return mine.filter(j => j.status === 'done');
  return mine;
}
function statusLabel(s){
  const map = {new:'statusNew', diagnosing:'statusDiagnosing', waiting:'statusWaiting', approved:'statusApproved', in_progress:'statusInProgress', done:'statusDone'};
  return map[s] ? t(map[s]) : s;
}
function hasRepeatComplaint(job){
  return STATE.jobs.some(j => j.id !== job.id && j.vin === job.vin && j.status === 'done');
}

const WEEK_MS = 7 * 24 * 60 * 60 * 1000;
function flaggedHoursThisWeek(){
  const now = Date.now();
  return myJobs()
    .filter(j => j.flagHours != null && (now - j.createdAt) <= WEEK_MS)
    .reduce((sum, j) => sum + j.flagHours, 0);
}
function jobsFlaggedThisWeekCount(){
  const now = Date.now();
  return myJobs().filter(j => j.flagHours != null && (now - j.createdAt) <= WEEK_MS).length;
}

function renderList(){
  const tech = STATE.techs.find(t => t.id === STATE.currentTechId);
  const upNextCount = jobsForTab('up_next').length;
  const historyCount = jobsForTab('history').length;
  const list = jobsForTab(STATE.activeTab).sort((a,b)=> a.createdAt-b.createdAt);

  return `
    <div class="topbar">
      <div class="brand">
        <small>Lee Transmission</small>
        <h1>My <span>Numbers</span></h1>
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        ${renderLangSwitch(true)}
        <div class="avatar-btn" id="btnLogout">${tech.name[0]}</div>
      </div>
    </div>
    <div class="flag-hero">
      <div class="label">${t('flagHeroLabel')}</div>
      <div class="value">${flaggedHoursThisWeek().toFixed(1)}<span>hrs</span></div>
      <div class="sub"><b>${jobsFlaggedThisWeekCount()}</b> ${jobsFlaggedThisWeekCount()===1?t('flagHeroSubJob'):t('flagHeroSubJobs')} ${t('flagHeroSubSuffix')}</div>
    </div>
    <div class="tabs">
      <div class="tab ${STATE.activeTab==='up_next'?'active':''}" data-tab="up_next">${t('tabUpNext')} <span class="count">${upNextCount}</span></div>
      <div class="tab ${STATE.activeTab==='history'?'active':''}" data-tab="history">${t('tabHistory')} <span class="count">${historyCount}</span></div>
    </div>
    <div class="job-list">
      ${list.length === 0 ? `
        <div class="empty-state">
          <h3>${STATE.activeTab==='up_next' ? t('emptyUpNextTitle') : t('emptyHistoryTitle')}</h3>
          <p>${STATE.activeTab==='up_next' ? t('emptyUpNextBody') : t('emptyHistoryBody')}</p>
        </div>
      ` : list.map(j => `
        <div class="tag status-${j.status}" data-id="${j.id}">
          <div class="tag-top">
            <div>
              <div class="tag-vehicle">${j.vehicle}</div>
              <div class="tag-vin mono">${j.vin}</div>
            </div>
            <div class="status-pill status-${j.status}">${statusLabel(j.status)}</div>
          </div>
          <div class="tag-complaint">
            <b>${t('complaintLabel')}</b>
            ${j.complaint}
          </div>
          <div class="tag-meta">
            <div class="tag-customer">${j.customer}</div>
            ${hasRepeatComplaint(j) && j.status!=='done' ? `<div class="repeat-flag">${t('repeatFlag')}</div>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function bindList(){
  bindLangSwitch();
  document.getElementById('btnLogout').addEventListener('click', () => {
    STATE.view = 'login';
    STATE.currentTechId = null;
    STATE.loginPhone = '';
    STATE.loginPin = '';
    STATE.loginError = '';
    render();
  });
  document.querySelectorAll('.tab').forEach(el => {
    el.addEventListener('click', () => { STATE.activeTab = el.dataset.tab; render(); });
  });
  document.querySelectorAll('.tag').forEach(el => {
    el.addEventListener('click', () => {
      STATE.activeJobId = el.dataset.id;
      STATE.view = 'detail';
      render();
    });
  });
}

/* ---------------- DETAIL ---------------- */
function getActiveJob(){ return STATE.jobs.find(j => j.id === STATE.activeJobId); }

function fileToDataUrl(file){
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

function renderPhotoGrid(photos, addId, label){
  return `
    <h3>${label} (${photos.length})</h3>
    <div class="photo-grid">
      ${photos.map(p => `<div class="photo-thumb"><img src="${p}"></div>`).join('')}
      <label class="photo-add" for="${addId}">
        <div class="plus">+</div>
        <div>${t('addPhotoLabel')}</div>
      </label>
    </div>
    <input type="file" accept="image/*" capture="environment" id="${addId}">
  `;
}

function renderDetail(){
  const job = getActiveJob();
  const priorJobs = STATE.jobs.filter(j => j.vin === job.vin && j.id !== job.id);
  const repeatDone = priorJobs.filter(j => j.status === 'done');

  let cta = '';
  if(job.status === 'new'){
    cta = `<button class="btn btn-primary" id="btnStartDiag">${t('ctaStartDiag')}</button>`;
  } else if(job.status === 'diagnosing'){
    cta = `<button class="btn btn-primary" id="btnSubmitDiag">${t('ctaSubmitDiag')}</button>`;
  } else if(job.status === 'waiting'){
    cta = `<button class="btn btn-outline" disabled>${t('ctaWaiting')}</button>`;
  } else if(job.status === 'approved'){
    cta = `<button class="btn btn-go" id="btnStartJob">${t('ctaGoAhead')}</button>`;
  } else if(job.status === 'in_progress'){
    cta = `<button class="btn btn-primary" id="btnMarkDone">${t('ctaMarkDone')}</button>`;
  } else {
    cta = `<button class="btn btn-outline" disabled>${t('ctaClosed')}</button>`;
  }

  return `
    <div class="back-row">
      <button class="back-btn" id="btnBack">${t('backToBoard')}</button>
    </div>
    <div class="detail">
      <div class="detail-hero">
        <h2>${job.vehicle}</h2>
        <div class="detail-vin mono">VIN ${job.vin}</div>
        <div class="detail-status-row">
          <div class="status-pill status-${job.status}">${statusLabel(job.status)}</div>
        </div>
      </div>

      <div class="section">
        <h3>${t('complaintLabel')} — ${job.customer}</h3>
        <div class="complaint-box">${job.complaint}</div>
      </div>

      ${repeatDone.length > 0 ? `
      <div class="section" style="border-bottom:none;">
        <h3>${t('vehicleHistoryLabel')}</h3>
        ${repeatDone.map(pj => `
          <div class="history-hit">
            <b>${t('workedBeforeLabel')}</b> ${pj.complaint}
            ${pj.diagnosis ? `<br><span style="color:var(--gauge);">${t('priorFixLabel')} ${pj.diagnosis}</span>` : ''}
          </div>
        `).join('')}
      </div>` : ''}

      <div class="section">
        ${renderPhotoGrid(job.beforePhotos, 'beforePhotoInput', t('beforePhotosLabel'))}
      </div>

      <div class="section">
        <h3>${t('diagnosticLabel')}</h3>
        <textarea id="diagText" placeholder="${t('diagnosticPlaceholder')}" ${job.status==='new'?'disabled':''}>${job.diagnosis}</textarea>
      </div>

      ${['approved','in_progress','done'].includes(job.status) ? `
      <div class="section" style="border-bottom:none;">
        ${renderPhotoGrid(job.partPhotos, 'partPhotoInput', t('partPhotosLabel'))}
      </div>` : ''}
    </div>
    <div class="sticky-cta">${cta}</div>
  `;
}

async function persistJobs(){ await sSet('jobs_v2', STATE.jobs); }

function bindDetail(){
  const job = getActiveJob();

  document.getElementById('btnBack').addEventListener('click', () => { STATE.view = 'list'; render(); });

  const diagText = document.getElementById('diagText');
  if(diagText){
    diagText.addEventListener('input', (e) => { job.diagnosis = e.target.value; });
  }

  const beforeInput = document.getElementById('beforePhotoInput');
  if(beforeInput){
    beforeInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if(!file) return;
      const dataUrl = await fileToDataUrl(file);
      job.beforePhotos.push(dataUrl);
      await persistJobs();
      render();
      showToast(t('toastPhotoAdded'));
    });
  }
  const partInput = document.getElementById('partPhotoInput');
  if(partInput){
    partInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if(!file) return;
      const dataUrl = await fileToDataUrl(file);
      job.partPhotos.push(dataUrl);
      await persistJobs();
      render();
      showToast(t('toastPhotoAdded'));
    });
  }

  const btnStartDiag = document.getElementById('btnStartDiag');
  if(btnStartDiag) btnStartDiag.addEventListener('click', async () => {
    job.status = 'diagnosing'; await persistJobs(); render();
  });

  const btnSubmitDiag = document.getElementById('btnSubmitDiag');
  if(btnSubmitDiag) btnSubmitDiag.addEventListener('click', async () => {
    if(!job.diagnosis || job.diagnosis.trim().length < 3){
      showToast(t('toastNeedDiagnosis'));
      return;
    }
    job.status = 'waiting'; await persistJobs(); render();
    showToast(t('toastSentWriter'));
    // demo-only: auto-approve after a moment so Cris can see the full flow without a second device
    setTimeout(async () => {
      if(job.status === 'waiting'){
        job.status = 'approved';
        if(job.flagHours == null){ job.flagHours = 2.5; } // set by office/service writer on approval
        await persistJobs();
        if(STATE.view==='detail' && STATE.activeJobId===job.id) render();
      }
    }, 4000);
  });

  const btnStartJob = document.getElementById('btnStartJob');
  if(btnStartJob) btnStartJob.addEventListener('click', async () => {
    job.status = 'in_progress'; await persistJobs(); render();
  });

  const btnMarkDone = document.getElementById('btnMarkDone');
  if(btnMarkDone) btnMarkDone.addEventListener('click', async () => {
    job.status = 'done'; await persistJobs(); render();
    showToast(t('toastJobComplete'));
    setTimeout(() => { STATE.view = 'list'; STATE.activeTab='up_next'; render(); }, 700);
  });
}

/* ---------------- Boot ---------------- */
(async function boot(){
  await initData();
  render();
})();
</script>
</body>
</html>
