<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lee Transmission - Shop Flow</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0b1120 url('shop-bg.jpg') center center / cover no-repeat fixed;
      color: #e0e0e0;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(7, 10, 22, 0.82);
      z-index: 0;
      pointer-events: none;
    }
    header, .stats-bar, .flow-outer { position: relative; z-index: 1; }

    /* HEADER */
    header {
      text-align: center;
      padding: 10px 14px 6px;
      position: relative;
    }
    header h1 { font-size: 1.05rem; color: #f5c518; letter-spacing: 2px; text-transform: uppercase; }
    header p  { font-size: 0.62rem; color: #4b5563; margin-top: 2px; }
    .header-toolbar { display:flex; gap:6px; justify-content:center; margin-top:6px; flex-wrap:wrap; }
    .tool-btn {
      font-size:0.65rem; font-weight:600; padding:4px 12px;
      border-radius:5px; border:1px solid #374151;
      background:#1f2937; color:#9ca3af; cursor:pointer;
    }
    .tool-btn:hover { background:#374151; color:#e0e0e0; }
    .tool-btn.blue { background:#0f1f3d; color:#93c5fd; border-color:#2563eb; }

    /* STATS */
    .stats-bar { display:flex; gap:5px; padding:0 14px 10px; flex-wrap:wrap; }
    .stat-pill {
      background:#1f2937; border:1px solid #374151; border-radius:6px;
      padding:4px 10px; display:flex; flex-direction:column;
      align-items:center; min-width:66px; flex:1;
    }
    .stat-pill .num { font-size:1.2rem; font-weight:800; line-height:1; }
    .stat-pill .lbl { font-size:0.52rem; text-transform:uppercase; letter-spacing:0.7px; color:#6b7280; margin-top:2px; text-align:center; }
    .stat-pill.total    .num { color:#f5c518; }
    .stat-pill.repair   .num { color:#22c55e; }
    .stat-pill.waiting  .num { color:#f59e0b; }
    .stat-pill.roadtest .num { color:#a78bfa; }
    .stat-pill.ready    .num { color:#06b6d4; }
    .stat-pill.lot      .num { color:#9ca3af; }


    /* TECH WHITEBOARD */
    .whiteboard-section {
      position: relative; z-index: 1;
      padding: 0 14px 36px;
    }
    .whiteboard-title {
      font-size: 0.58rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 2px; color: #4b5563; text-align: center; margin-bottom: 12px;
    }
    .whiteboard-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    }
    .wb-card {
      background: #111827; border: 2px solid #1e293b; border-radius: 12px;
      overflow: hidden; display: flex; flex-direction: column;
    }
    .wb-card-header {
      padding: 11px 14px 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .wb-tech-name {
      font-size: 1.1rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px;
    }
    .wb-status-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .wb-divider { height: 1px; background: #1e293b; }
    .wb-block { padding: 9px 14px; }
    .wb-block-label {
      font-size: 0.5rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.5px; color: #4b5563; margin-bottom: 5px;
    }
    .wb-ro   { font-size: 0.85rem; font-weight: 800; color: #f5c518; }
    .wb-veh  { font-size: 0.7rem; color: #9ca3af; margin-top: 2px; }
    .wb-badge {
      display: inline-block; margin-top: 5px;
      font-size: 0.58rem; font-weight: 700; padding: 2px 7px; border-radius: 4px;
    }
    .wb-next-field {
      width: 100%; background: #0a0e1a; border: 1px solid #1e293b;
      border-radius: 6px; padding: 7px 9px;
      font-size: 0.72rem; color: #e0e0e0; font-family: inherit;
      resize: none; height: 64px; outline: none; box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .wb-next-field:focus { border-color: #374151; }
    .wb-next-field::placeholder { color: #2d3748; font-style: italic; }
    .wb-vehicle-row {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 6px; margin-bottom: 7px; padding-bottom: 7px;
      border-bottom: 1px solid #1e293b;
    }
    .wb-vehicle-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .wb-vehicle-info { flex: 1; min-width: 0; }
    .wb-reorder-btns { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
    .wb-order-btn {
      background: #1e293b; border: 1px solid #374151; color: #6b7280;
      border-radius: 3px; cursor: pointer; font-size: 0.6rem; font-weight: 700;
      padding: 2px 5px; line-height: 1; transition: all 0.15s;
    }
    .wb-order-btn:hover:not(:disabled) { background: #374151; color: #e0e0e0; }
    .wb-order-btn:disabled { opacity: 0.2; cursor: default; }
    @media (max-width: 960px) {
      .whiteboard-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 500px) {
      .whiteboard-grid { grid-template-columns: 1fr; }
    }

    /* UNASSIGNED POOL */
    .pool-section {
      position: relative; z-index: 1;
      padding: 0 14px 36px;
    }
    .pool-title {
      font-size: 0.58rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 2px; color: #4b5563; text-align: center; margin-bottom: 12px;
    }
    .pool-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    }
    .pool-col {
      background: #0d1526; border: 1px solid #1e293b; border-radius: 10px;
      overflow: hidden; display: flex; flex-direction: column;
    }
    .pool-col-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; background: #111827; border-bottom: 1px solid #1e293b;
    }
    .pool-col-title {
      font-size: 0.65rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 1px; color: #9ca3af;
    }
    .pool-count-badge {
      background: #1f2937; color: #6b7280; border: 1px solid #374151;
      font-size: 0.6rem; font-weight: 800; padding: 1px 7px; border-radius: 10px;
    }
    .pool-count-badge.has-jobs { background: #1e3a5f; color: #93c5fd; border-color: #2563eb; }
    .pool-jobs-list { padding: 6px; display: flex; flex-direction: column; gap: 5px; }
    .pool-job-card {
      background: #111827; border: 1px solid #1e293b; border-radius: 7px;
      padding: 7px 9px;
    }
    .pool-card-top {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px;
    }
    .pool-source-tag {
      font-size: 0.52rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
      background: #1f2937; color: #6b7280; border: 1px solid #374151;
      padding: 1px 5px; border-radius: 3px;
    }
    .pool-status-badge {
      font-size: 0.52rem; font-weight: 700; text-transform: uppercase;
      padding: 1px 5px; border-radius: 3px;
    }
    .pool-po  { font-size: 0.82rem; font-weight: 800; color: #f5c518; }
    .pool-veh { font-size: 0.65rem; color: #6b7280; margin-top: 1px; }
    .pool-empty { padding: 10px 12px; font-size: 0.65rem; color: #374151; font-style: italic; text-align: center; }
    @media (max-width: 960px) { .pool-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 500px)  { .pool-grid { grid-template-columns: 1fr; } }

    .realtime-dot {
      display:inline-block; width:6px; height:6px; border-radius:50%;
      background:#22c55e; margin-right:4px;
      animation: pulse 2s infinite;
      vertical-align: middle;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  </style>
</head>
<body>

<header>
  <h1><span class="realtime-dot"></span>Lee Transmission - Shop Flow</h1>
  <p id="clock"></p>
  <div class="header-toolbar">
    <button class="tool-btn blue" onclick="window.open('shop-board.html','_blank')">Shop Board</button>
    <button class="tool-btn" onclick="window.open('teardown.html','_blank')" style="background:#1a1a0a;color:#fcd34d;border-color:#78350f">Teardown</button>
    <button class="tool-btn" onclick="loadAll()">Refresh</button>
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>


<!-- TECH WHITEBOARD -->
<div class="whiteboard-section">
  <div class="whiteboard-title">⬜ Tech Whiteboard</div>
  <div class="whiteboard-grid" id="whiteboardGrid"></div>
</div>

<!-- UNASSIGNED JOBS POOL -->
<div class="pool-section">
  <div class="pool-title">Unassigned Jobs Pool</div>
  <div class="pool-grid" id="poolGrid"></div>
</div>

<script>
  /* ---- SUPABASE CONFIG ---- */
  const SUPABASE_URL = 'https://hygemiszxwmyrkmhbjub.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_8o9Df7K_DGpQ3s6yUCDq-A_HMh4Zllo';

  async function sbFetch(path) {
    const res = await fetch(SUPABASE_URL + path, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
      }
    });
    return res.json();
  }

  /* ---- CONSTANTS ---- */
  const NAMED_TECHS = ['Capote','Cory','Alex','Cuba'];
  const TECH_COLOR = { Capote:'#f59e0b', Cory:'#22d3ee', Alex:'#4ade80', Cuba:'#a78bfa' };

  const TECH_STATUS_LABEL = {
    'available':        'Available',
    'working':          'Working',
    'waiting-pull':     'Waiting on Pull',
    'waiting-install':  'Waiting Install',
    'qc':               'QC',
    'road-testing':     'Road Testing',
    'finished':         'Finished',
  };

  const STATUS_DISPLAY = {
    'in-progress':  { label:'In Progress',   bg:'#052e16', color:'#86efac' },
    'waiting-part': { label:'Waiting Part',  bg:'#2c1a00', color:'#fcd34d' },
    'waiting-tech': { label:'Waiting Tech',  bg:'#0f1f3d', color:'#93c5fd' },
    'delayed':      { label:'Delayed',       bg:'#3b0a0a', color:'#fca5a5' },
    'done':         { label:'Done/Ready',    bg:'#052630', color:'#67e8f9' },
    'empty':        { label:'Unassigned',    bg:'#1f2937', color:'#6b7280' },
  };

  function inferStage(vehicle) {
    if (vehicle.flow_stage) return vehicle.flow_stage;
    if (vehicle._source === 'parking') return 'parking-lot';
    if (vehicle._source === 'pickup')  return 'ready-pickup';
    const s = vehicle.status || '';
    if (s === 'in-progress')  return 'repair';
    if (s === 'waiting-part' || s === 'waiting-tech' || s === 'delayed') return 'waiting';
    if (s === 'done')         return 'road-test';
    return 'repair';
  }

  /* ---- STATE ---- */
  let allVehicles = [];
  let whiteboardData = {}; // { techName: nextJobText }

  async function loadAll() {
    try {
      const [lifts, parking, pickup] = await Promise.all([
        sbFetch('/rest/v1/shopboard_lifts?select=*&order=id'),
        sbFetch('/rest/v1/shopboard_parking?select=*&order=created_at'),
        sbFetch('/rest/v1/shopboard_pickup?select=*&order=created_at'),
      ]);

      allVehicles = [];
      (lifts || []).forEach((l, idx) => {
        if ((l.po||'').trim() && (l.vehicle||'').trim())
          allVehicles.push({ ...l, _source:'lift', _liftNum: idx+1 });
      });
      (parking || []).forEach(p => {
        if ((p.po||'').trim() && (p.vehicle||'').trim())
          allVehicles.push({ ...p, _source:'parking' });
      });
      (pickup || []).forEach(p => {
        if ((p.po||'').trim() && (p.vehicle||'').trim())
          allVehicles.push({ ...p, _source:'pickup' });
      });

      render();
    } catch(e) { console.error('loadAll failed', e); }
  }

  /* ---- RENDER ---- */
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    renderStats();
    renderWhiteboard();
    renderPool();
  }

  function renderPool() {
    const grid = document.getElementById('poolGrid');
    if (!grid) return;

    const unassigned = allVehicles.filter(v =>
      (v._source === 'lift' || v._source === 'parking') &&
      (!v.assigned_tech || v.assigned_tech.trim() === '' || v.assigned_tech === 'Unassigned')
    );

    const categories = [
      { key: 'Gen Auto',      label: 'Gen Auto' },
      { key: 'Rebuild',       label: 'Rebuild' },
      { key: 'Diag',          label: 'Diag' },
      { key: '__uncategorized', label: 'Uncategorized' },
    ];

    grid.innerHTML = categories.map(cat => {
      const jobs = cat.key === '__uncategorized'
        ? unassigned.filter(v => !v.job_category || v.job_category.trim() === '')
        : unassigned.filter(v => v.job_category === cat.key);

      const countClass = jobs.length > 0 ? ' has-jobs' : '';

      const cards = jobs.length === 0
        ? '<div class="pool-empty">No jobs</div>'
        : jobs.map(v => {
            const source = v._source === 'lift' ? `Lift ${v._liftNum}` : 'Lot';
            const sd = STATUS_DISPLAY[v.status] || STATUS_DISPLAY['empty'];
            return `
              <div class="pool-job-card">
                <div class="pool-card-top">
                  <span class="pool-source-tag">${esc(source)}</span>
                  <span class="pool-status-badge" style="background:${sd.bg};color:${sd.color}">${sd.label}</span>
                </div>
                <div class="pool-po">${esc(v.po)}</div>
                <div class="pool-veh">${esc(v.vehicle)}</div>
              </div>`;
          }).join('');

      return `
        <div class="pool-col">
          <div class="pool-col-header">
            <span class="pool-col-title">${cat.label}</span>
            <span class="pool-count-badge${countClass}">${jobs.length}</span>
          </div>
          <div class="pool-jobs-list">${cards}</div>
        </div>`;
    }).join('');
  }

  function renderStats() {
    const total    = allVehicles.length;
    const onLift   = allVehicles.filter(v => v._source === 'lift').length;
    const inLot    = allVehicles.filter(v => v._source === 'parking').length;
    const repair   = allVehicles.filter(v => inferStage(v) === 'repair').length;
    const waiting  = allVehicles.filter(v => inferStage(v) === 'waiting').length;
    const roadTest = allVehicles.filter(v => inferStage(v) === 'road-test').length;
    const ready    = allVehicles.filter(v => v._source === 'pickup').length;

    document.getElementById('statsBar').innerHTML = `
      <div class="stat-pill total">   <span class="num">${total}</span><span class="lbl">Total</span></div>
      <div class="stat-pill lot">     <span class="num">${inLot}</span><span class="lbl">In Lot</span></div>
      <div class="stat-pill repair">  <span class="num">${repair}</span><span class="lbl">On Lift</span></div>
      <div class="stat-pill waiting"> <span class="num">${waiting}</span><span class="lbl">Waiting</span></div>
      <div class="stat-pill roadtest"><span class="num">${roadTest}</span><span class="lbl">Road Test</span></div>
      <div class="stat-pill ready">   <span class="num">${ready}</span><span class="lbl">Pickup</span></div>
    `;
  }

  /* ---- WHITEBOARD ---- */
  async function loadWhiteboard() {
    try {
      const rows = await sbFetch('/rest/v1/tech_whiteboard?select=*');
      if (Array.isArray(rows)) {
        rows.forEach(r => { whiteboardData[r.tech_name] = r.next_job || ''; });
      }
    } catch(e) {}
    renderWhiteboard();
  }

  function renderWhiteboard() {
    const grid = document.getElementById('whiteboardGrid');
    if (!grid) return;

    const STATUS_BG = {
      'working':         '#14532d',
      'waiting-pull':    '#1a2e05',
      'waiting-install': '#422006',
      'qc':              '#0c1a3d',
      'road-testing':    '#4c1d95',
      'finished':        '#164e63',
      'available':       '#111827',
    };
    const STATUS_COLOR = {
      'working':         '#86efac',
      'waiting-pull':    '#a3e635',
      'waiting-install': '#fde047',
      'qc':              '#7dd3fc',
      'road-testing':    '#c4b5fd',
      'finished':        '#67e8f9',
      'available':       '#4b5563',
    };
    const DOT_COLOR = {
      'working':         '#16a34a',
      'waiting-pull':    '#65a30d',
      'waiting-install': '#ca8a04',
      'qc':              '#0284c7',
      'road-testing':    '#7c3aed',
      'finished':        '#0891b2',
      'available':       '#374151',
    };

    grid.innerHTML = NAMED_TECHS.map(tech => {
      const color = TECH_COLOR[tech];
      const assigned = allVehicles
        .filter(v => v.assigned_tech === tech && (v._source === 'lift' || v._source === 'parking'))
        .sort((a, b) => (a.job_order ?? 9999) - (b.job_order ?? 9999));

      const activeJobs = assigned.filter(v =>
        v.tech_status && v.tech_status !== 'finished' && v.tech_status !== 'available'
      );

      const primary  = activeJobs[0] || assigned[0];
      const ts       = primary?.tech_status || 'available';
      const dot      = DOT_COLOR[ts] || '#374151';
      const nextText = whiteboardData[tech] || '';

      const jobRows = activeJobs.length === 0
        ? `<div style="font-size:0.68rem;color:#374151;font-style:italic;">No active job</div>`
        : activeJobs.map((v, idx) => {
            const bg  = STATUS_BG[v.tech_status]    || STATUS_BG['available'];
            const col = STATUS_COLOR[v.tech_status] || STATUS_COLOR['available'];
            const lbl = TECH_STATUS_LABEL[v.tech_status] || v.tech_status;
            const src = v._source === 'lift' ? `Lift ${v._liftNum}` : 'Lot';
            const isFirst = idx === 0;
            const isLast  = idx === activeJobs.length - 1;
            return `
              <div class="wb-vehicle-row">
                <div class="wb-vehicle-info">
                  <div style="display:flex;align-items:center;gap:5px;margin-bottom:2px">
                    <div class="wb-ro">${esc(v.po)}</div>
                    <span style="font-size:0.5rem;background:#1e293b;color:#6b7280;padding:1px 4px;border-radius:3px;font-weight:700">${esc(src)}</span>
                  </div>
                  <div class="wb-veh">${esc(v.vehicle)}</div>
                  <span class="wb-badge" style="background:${bg};color:${col}">${lbl}</span>
                </div>
                <div class="wb-reorder-btns">
                  <button class="wb-order-btn" onclick="reorderJob('${v.id}','${v._source}','up','${tech}')" ${isFirst ? 'disabled' : ''}>up</button>
                  <button class="wb-order-btn" onclick="reorderJob('${v.id}','${v._source}','down','${tech}')" ${isLast ? 'disabled' : ''}>dn</button>
                </div>
              </div>`;
          }).join('');

      return `
        <div class="wb-card" style="border-color:${color}40;">
          <div class="wb-card-header" style="background:${color}18;">
            <div class="wb-tech-name" style="color:${color}">${esc(tech)}</div>
            <div class="wb-status-dot" style="background:${dot}"></div>
          </div>
          <div class="wb-divider"></div>
          <div class="wb-block">
            <div class="wb-block-label">Working On</div>
            ${jobRows}
          </div>
          <div class="wb-divider"></div>
          <div class="wb-block">
            <div class="wb-block-label">Up Next</div>
            <textarea class="wb-next-field" placeholder="Write what's next..." data-tech="${esc(tech)}" onblur="saveNextJob(this)">${esc(nextText)}</textarea>
          </div>
        </div>`;
    }).join('');
  }

  async function reorderJob(vehicleId, source, direction, tech) {
    const assigned = allVehicles
      .filter(v => v.assigned_tech === tech && (v._source === 'lift' || v._source === 'parking'))
      .sort((a, b) => (a.job_order ?? 9999) - (b.job_order ?? 9999));
    const activeJobs = assigned.filter(v =>
      v.tech_status && v.tech_status !== 'finished' && v.tech_status !== 'available'
    );
    const idx = activeJobs.findIndex(v => String(v.id) === String(vehicleId) && v._source === source);
    if (idx < 0) return;
    const swapIdx = direction === 'up' ? idx - 1 : idx + 1;
    if (swapIdx < 0 || swapIdx >= activeJobs.length) return;

    const a = activeJobs[idx];
    const b = activeJobs[swapIdx];
    const aOrder = swapIdx + 1;
    const bOrder = idx + 1;
    a.job_order = aOrder;
    b.job_order = bOrder;

    renderWhiteboard();

    const patch = async (v, order) => {
      const tbl = v._source === 'lift' ? 'shopboard_lifts' : 'shopboard_parking';
      await fetch(`${SUPABASE_URL}/rest/v1/${tbl}?id=eq.${v.id}`, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify({ job_order: order }),
      });
    };
    await Promise.all([patch(a, aOrder), patch(b, bOrder)]);
  }

  async function saveNextJob(el) {
    const tech = el.dataset.tech;
    const text = el.value;
    whiteboardData[tech] = text;
    try {
      await fetch(SUPABASE_URL + '/rest/v1/tech_whiteboard', {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'resolution=merge-duplicates',
        },
        body: JSON.stringify({ tech_name: tech, next_job: text }),
      });
    } catch(e) {}
  }

  /* ---- REALTIME ---- */
  function connectRealtime() {
    try {
      const wsUrl = SUPABASE_URL.replace('https','wss')
        + '/realtime/v1/websocket?apikey=' + SUPABASE_KEY + '&vsn=1.0.0';
      const ws = new WebSocket(wsUrl);
      ws.onopen = () => {
        ['shopboard_lifts','shopboard_parking','shopboard_pickup'].forEach(tbl => {
          ws.send(JSON.stringify({
            topic: 'realtime:public:' + tbl,
            event: 'phx_join',
            payload: {},
            ref: null
          }));
        });
      };
      ws.onmessage = (msg) => {
        try {
          const d = JSON.parse(msg.data);
          if (['INSERT','UPDATE','DELETE'].includes(d?.payload?.type)) loadAll();
        } catch(e) {}
      };
      ws.onclose = () => setTimeout(connectRealtime, 5000);
    } catch(e) { console.warn('Realtime unavailable', e); }
  }

  /* ---- CLOCK ---- */
  function tick() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})
      + '  |  ' + now.toLocaleTimeString('en-US');
  }

  loadAll();
  loadWhiteboard();
  connectRealtime();
  setInterval(loadAll, 30000);
  tick();
  setInterval(tick, 1000);
</script>

<!-- AI Chat Widget -->
<style>
#ai-bubble{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:none;border:2px solid #2563eb;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.5);z-index:9999;padding:0;overflow:hidden;transition:transform .15s ease;}
#ai-bubble:hover{transform:scale(1.1);}
#ai-bubble img{width:100%;height:100%;object-fit:cover;display:block;}
#ai-panel{position:fixed;bottom:88px;right:24px;width:340px;max-height:480px;background:#1e2535;border:1px solid #334155;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.6);z-index:9998;display:none;flex-direction:column;overflow:hidden;}
#ai-panel.open{display:flex;}
#ai-header{background:#162032;padding:10px 14px;font-size:14px;font-weight:600;color:#93c5fd;display:flex;justify-content:space-between;align-items:center;}
#ai-header-left{display:flex;align-items:center;gap:8px;}
#ai-header-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1px solid #2563eb;}
#ai-header button{background:none;border:none;color:#64748b;font-size:18px;cursor:pointer;line-height:1;}
#ai-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;font-size:13px;}
.ai-msg-user{align-self:flex-end;background:#2563eb;color:#fff;padding:6px 10px;border-radius:10px 10px 2px 10px;max-width:80%;}
.ai-msg-bot{align-self:flex-start;background:#0f172a;color:#e2e8f0;padding:6px 10px;border-radius:10px 10px 10px 2px;max-width:90%;white-space:pre-wrap;}
.ai-msg-err{align-self:flex-start;background:#7f1d1d;color:#fca5a5;padding:6px 10px;border-radius:8px;max-width:90%;font-size:12px;}
#ai-footer{padding:8px;display:flex;gap:6px;border-top:1px solid #334155;}
#ai-input{flex:1;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:7px 10px;color:#e2e8f0;font-size:13px;outline:none;}
#ai-send{background:#2563eb;color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;}
#ai-send:disabled{opacity:.5;cursor:default;}
</style>
<button id="ai-bubble" title="Ask Kiki"><img src="/kiki-avatar.png" alt="Kiki" /></button>
<div id="ai-panel">
  <div id="ai-header">
    <div id="ai-header-left"><img id="ai-header-avatar" src="/kiki-avatar.png" alt="Kiki" /><span>Kiki</span></div>
    <button id="ai-close" title="Close">&times;</button>
  </div>
  <div id="ai-messages"></div>
  <div id="ai-footer">
    <input id="ai-input" type="text" placeholder="Ask about the board..." />
    <button id="ai-send">Ask</button>
  </div>
</div>
<script>
(function(){
  const bubble = document.getElementById('ai-bubble');
  const panel  = document.getElementById('ai-panel');
  const close  = document.getElementById('ai-close');
  const msgs   = document.getElementById('ai-messages');
  const input  = document.getElementById('ai-input');
  const send   = document.getElementById('ai-send');

  bubble.addEventListener('click', () => { panel.classList.toggle('open'); if(panel.classList.contains('open')) input.focus(); });
  close.addEventListener('click', () => panel.classList.remove('open'));

  function addMsg(text, cls) {
    const d = document.createElement('div');
    d.className = cls;
    d.textContent = text;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }

  async function askAI() {
    const q = input.value.trim();
    if (!q) return;
    input.value = '';
    send.disabled = true;
    addMsg(q, 'ai-msg-user');
    const thinking = document.createElement('div');
    thinking.className = 'ai-msg-bot';
    thinking.textContent = 'Thinking...';
    msgs.appendChild(thinking);
    msgs.scrollTop = msgs.scrollHeight;

    const boardData = {
      vehicles: typeof allVehicles !== 'undefined' ? allVehicles : [],
      whiteboard: typeof whiteboardData !== 'undefined' ? whiteboardData : {}
    };

    try {
      const r = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ question: q, boardData })
      });
      const d = await r.json();
      thinking.textContent = d.answer || d.error || 'No response';
      if (d.error) thinking.className = 'ai-msg-err';
    } catch(e) {
      thinking.className = 'ai-msg-err';
      thinking.textContent = 'Network error: ' + e.message;
    }
    send.disabled = false;
    input.focus();
  }

  send.addEventListener('click', askAI);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') askAI(); });
})();
</script>
